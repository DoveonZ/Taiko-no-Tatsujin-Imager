                if (tjaModeActive) {
                    tjaModeActive = false;
                    btnModeSwitch.textContent = '切换到TJA模式';
                    updateTjaModeUI();
                }
                courseContainer.style.display = 'none';
                exampleDropdown.style.display = 'none';
                render();
                e.stopPropagation();
            });
            exampleDropdown.appendChild(btn);
        });
    }

    async function loadExternalTJA() {
        try {
            const r = await fetch('example/example.tja');
            if (!r.ok) throw new Error();
            return await r.text();
        } catch (e) { return FALLBACK_TJA; }
    }
    async function enterTJAMode() {
        tjaModeActive = true;
        btnModeSwitch.textContent = '切换到ox模式';
        updateTjaModeUI();
        const tjaContent = await loadExternalTJA();
        textarea.value = tjaContent;
        tjaCourses = parseTJA(tjaContent);
        updateCourseButtons();
        selectedCourse = tjaCourses.length ? tjaCourses[0] : null;
        backgroundMergeActive = true;
        bgMergeCheckbox.checked = true;
        render();
    }
    function exitTJAMode(clear = true) {
        tjaModeActive = false;
        btnModeSwitch.textContent = '切换到TJA模式';
        updateTjaModeUI();
        if (clear) textarea.value = '';
        courseContainer.style.display = 'none';
        selectedCourse = null;
        render();
    }

    // ----- 事件绑定 -----
    btnModeSwitch.addEventListener('click', () => { if (tjaModeActive) exitTJAMode(true); else enterTJAMode(); });
    btnTJAtoText.addEventListener('click', () => { if (!selectedCourse) return; textarea.value = convertTJAtoText(selectedCourse.rows); exitTJAMode(false); });
    tjaFileInput.addEventListener('change', function(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = function(ev) { textarea.value = ev.target.result; if (tjaModeActive) { tjaCourses = parseTJA(textarea.value); updateCourseButtons(); selectedCourse = tjaCourses.length ? tjaCourses[0] : null; } render(); }; r.readAsText(f); });
    textarea.addEventListener('input', () => { if (tjaModeActive) { tjaCourses = parseTJA(textarea.value); updateCourseButtons(); selectedCourse = tjaCourses.length ? tjaCourses[0] : null; } render(); });
    hsInput.addEventListener('input', render);
    btnMergeLines.addEventListener('click', () => { tjaMergeLinesActive = !tjaMergeLinesActive; btnMergeLines.classList.toggle('active', tjaMergeLinesActive); render(); });
    btnIgnoreScroll.addEventListener('click', () => {
        visualFocusActive = !visualFocusActive; btnIgnoreScroll.classList.toggle('active', visualFocusActive);
        if (tjaModeActive) { const prev = selectedCourse ? selectedCourse.name : null; tjaCourses = parseTJA(textarea.value); updateCourseButtons(); selectedCourse = prev ? tjaCourses.find(c => c.name === prev) : (tjaCourses.length ? tjaCourses[0] : null); }
        render();
    });
    btnBalloonDetail.addEventListener('click', () => {
        showBalloonDetail = !showBalloonDetail;
        btnBalloonDetail.classList.toggle('active', showBalloonDetail);
        render();
    });
    mergeViewCheckbox.addEventListener('change', () => {
        mergeViewActive = mergeViewCheckbox.checked;
        render();
    });
    bgMergeCheckbox.addEventListener('change', () => {
        backgroundMergeActive = bgMergeCheckbox.checked;
        render();
    });
    invertToggle.addEventListener('click', () => { invertActive = !invertActive; invertToggle.classList.toggle('active', invertActive); render(); });
    btnRandom.addEventListener('click', () => {
        if (!currentRowLayouts.length) return;
        randomMap = currentRowLayouts.map(l => l.elements.map(e => e.type !== 'space' && Math.random() < 0.5));
        render();
    });
    btnResetView.addEventListener('click', () => {
        invertActive = false; invertToggle.classList.remove('active');
        smallifyActive = false; smallifyBtn.classList.remove('active');
        randomMap = null; hideBars = false; btnHideBars.textContent = '隐藏小节线';
        render();
    });
    btnStyleSwitch.addEventListener('click', () => {
        currentStyleIndex = (currentStyleIndex + 1) % styleSequence.length;
        currentStyle = styleSequence[currentStyleIndex];
        Object.keys(loaded).forEach(k => loaded[k] = false);
        updateImageSources(); bindImageEvents();
        updateStyleButtonIcon();
        render();
    });
    smallifyBtn.addEventListener('click', () => { smallifyActive = !smallifyActive; smallifyBtn.classList.toggle('active', smallifyActive); render(); });
    btnHideBars.addEventListener('click', () => { hideBars = !hideBars; btnHideBars.textContent = hideBars ? '显示小节线' : '隐藏小节线'; render(); });
    btnClearBars.addEventListener('click', () => {
        const cleaned = textarea.value.replace(/[|/\\]/g, '');
        textarea.value = cleaned;
        if (tjaModeActive) {
            tjaCourses = parseTJA(cleaned);
            updateCourseButtons();
            selectedCourse = tjaCourses.length ? tjaCourses[0] : null;
        }
        render();
    });
    btnCollapseControls.addEventListener('click', () => {
        controlsCollapsed = !controlsCollapsed;
        if (controlsCollapsed) {
            Array.from(controlsRow.children).forEach(c => { if (c !== btnCollapseControls) c.style.display = 'none'; });
            courseContainer.style.display = 'none'; infoBar.style.display = 'none'; tutorialBox.style.display = 'none';
            legendBox.style.display = 'none'; divergenceWarning.style.display = 'none';
            btnCollapseControls.textContent = '展开功能区';
        } else {
            Array.from(controlsRow.children).forEach(c => { if (c !== btnCollapseControls && c !== btnModeSwitch) c.style.display = ''; });
            updateTjaModeUI();
            infoBar.style.display = ''; tutorialBox.style.display = tjaModeActive ? 'none' : 'flex';
            legendBox.style.display = tjaModeActive ? 'none' : ''; divergenceWarning.style.display = tjaModeActive ? 'block' : 'none';
            btnCollapseControls.textContent = '收起功能区';
        }
        btnModeSwitch.style.display = ''; btnCollapseControls.style.display = '';
    });
    btnDownloadImage.addEventListener('click', () => {
        if (!currentRowLayouts.length) return;
        const doInv = invertActive, doSmall = smallifyActive;
        const rowCanvases = currentRowLayouts.map((l, i) => {
            const c = document.createElement('canvas');
            const sd = buildRowSliders(l.elements);
            drawLine(c, l, doInv, doSmall, randomMap?.[i], hideBars, sd);
            return { canvas: c, firstX: l.firstNoteCanvasX, firstY: 100 };
        });
        const maxFirstX = Math.max(...rowCanvases.map(r => r.firstX));
        const infoH = (tjaModeActive && selectedCourse) ? FIXED_HEIGHT : 0, musicY = infoH;
        const finalH = musicY + 100 + (currentRowLayouts.length - 1) * 200 + 100;
        const maxW = Math.max(...rowCanvases.map((r, i) => (maxFirstX - r.firstX) + r.canvas.width));
        const mc = document.createElement('canvas'); mc.width = Math.ceil(maxW); mc.height = Math.ceil(finalH);
        const ctx = mc.getContext('2d');
        if (backgroundMergeActive) { ctx.fillStyle = '#272727'; ctx.fillRect(0, 0, mc.width, mc.height); }
        if (tjaModeActive && selectedCourse) {
            const title = selectedCourse.title || '', diff = selectedCourse.name || '', lv = selectedCourse.level || '';
            ctx.save(); ctx.font = 'bold 90px "DFPKanteiryu","KaiTi",sans-serif'; ctx.fillStyle = '#e0d5c5';
            ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;
            ctx.fillText(title, 12, 90);
            if (diff || lv) { ctx.font = 'bold 72px "DFPKanteiryu","KaiTi",sans-serif'; ctx.fillText(diff + (lv ? lv : ''), 12, 180); }
            ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.restore();
        }
        let y = musicY;
        currentRowLayouts.forEach((l, i) => { ctx.drawImage(rowCanvases[i].canvas, maxFirstX - rowCanvases[i].firstX, y); if (i < currentRowLayouts.length - 1) y += 200; });
        const url = mc.toDataURL('image/png');
        const w = window.open('');
        if (w) { w.document.write(`<img src="${url}" style="max-width:100%;height:auto;background:#272727;">`); w.document.title = '预览图片'; }
        else alert('请允许弹出窗口');
    });
    exampleDropdownBtn.addEventListener('click', (e) => { e.stopPropagation(); exampleDropdown.style.display = exampleDropdown.style.display === 'flex' ? 'none' : 'flex'; });
    document.addEventListener('click', (e) => { if (!e.target.closest('#exampleDropdownBtn') && !e.target.closest('#exampleDropdown')) exampleDropdown.style.display = 'none'; });

    function updateStyleButtonIcon() {
        const next = styleSequence[(currentStyleIndex + 1) % styleSequence.length];
        btnStyleSwitch.innerHTML = '';
        const img = document.createElement('img');
        img.src = `img/${next}/o.png`; img.alt = '样式'; img.style.width = '28px'; img.style.height = '28px';
        img.onerror = () => { btnStyleSwitch.textContent = '🎨'; };
        btnStyleSwitch.appendChild(img);
        smallifyImgBig.src = `img/${next}/oo.png`;
        smallifyImgSmall.src = `img/${next}/o.png`;
    }

    async function loadCustomFont() {
        try {
            const font = new FontFace('DFPKanteiryu', 'url(Font/Modified-DFPKanteiryu-XB.ttf)');
            await font.load();
            document.fonts.add(font);
        } catch (e) { console.warn('毛笔字体加载失败', e); }
    }

    // ----- 启动 -----
    async function initialize() {
        await loadCustomFont();
        await loadChineseMap();
        await loadExamples();
        updateTjaModeUI();
        textarea.value = '(ooxooxooxooxooox)ox(ooox)ox(oxooox)';
        textarea.setAttribute('wrap', 'off');
        render();
    }
    initialize();
})();
</script>
</body>
</html>
