<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太鼓之达人图像生成器</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --text: #2c2416;
            --text-secondary: #6b5e4a;
            --border: #e0d5c5;
            --accent: #c17f59;
            --accent-hover: #a06b48;
            --input-bg: #fdfaf6;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
            --font-mono: 'SF Mono','Cascadia Code','Consolas','Monaco','Menlo',monospace;
            --preview-bg: #272727;
            --preview-card-bg: #1e1e1e;
            --preview-text: #e0d5c5;
            --preview-border: #4a3f35;
            --ctrl-height: 40px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height:100vh;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            padding:12px;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(193,127,89,0.06) 0%, transparent 60%),
            radial-gradient(ellipse at 70% 80%, rgba(160,140,110,0.05) 0%, transparent 60%);
        }
        .app-container {
            width:100%;
            max-width:1300px;
            background:var(--card-bg);
            border-radius:20px;
            box-shadow:var(--shadow-lg);
            padding:32px 28px;
            display:flex;
            flex-direction:column;
            gap:16px;
        }
        .app-header h1 { font-size:2rem; font-weight:700; text-align:center; }
        .subtitle { text-align:center; font-size:0.95rem; color:var(--text-secondary); }
        .input-section { display:flex; flex-direction:column; gap:12px; }
        .input-row { display:flex; gap:10px; align-items:stretch; flex-wrap:wrap; }
        .textarea-wrapper { flex:1; min-width:280px; display:flex; }
        .textarea-wrapper textarea {
            flex:1; padding:14px 16px; font-size:1.05rem; font-family:var(--font-mono);
            letter-spacing:0.04em; border:2px solid var(--border); border-radius:var(--radius);
            background:var(--input-bg); color:var(--text); outline:none; resize:vertical;
            line-height:1.6; min-height:10em;
            white-space: pre; overflow-x: auto; wrap: off;
        }
        .btn {
            padding:0 16px; border:none; border-radius:var(--radius-sm); cursor:pointer;
            font-size:0.9rem; font-weight:600; display:inline-flex; align-items:center; gap:6px;
            background:#f8f5f0; color:var(--text-secondary); border:1.5px solid var(--border);
            white-space:nowrap; height:var(--ctrl-height);
        }
        .btn-primary { background:var(--accent); color:#fff; border:none; }
        .btn-primary:hover { background:var(--accent-hover); }
        .btn:hover { background:#f0ebe0; }
        .btn.active { background:#e8d5c0; border-color:var(--accent); }
        .btn-example { padding:6px 12px; font-size:0.85rem; font-family:var(--font-mono); height:auto; }
        .icon-btn {
            width:var(--ctrl-height); height:var(--ctrl-height); padding:2px; background:#f8f5f0;
            border:1.5px solid var(--border); border-radius:8px; cursor:pointer;
            display:inline-flex; align-items:center; justify-content:center;
            font-weight:700; font-size:1rem; flex-shrink:0;
        }
        .icon-btn img { width:28px; height:28px; object-fit:contain; }
        .icon-btn.active { background:#e8d5c0; border-color:var(--accent); }
        #btnStyleSwitch { padding:2px; }
        #btnStyleSwitch img { max-width:28px; max-height:28px; }
        .smallify-btn {
            height:var(--ctrl-height); width:calc(var(--ctrl-height)*2);
            background:#f8f5f0; border:1.5px solid var(--border); border-radius:8px;
            cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
            gap:4px; padding:2px; flex-shrink:0;
        }
        #smallifyImgBig { height:24px; object-fit:contain; }
        #smallifyImgSmall { height:16px; object-fit:contain; }
        .smallify-btn .arrow { font-size:1.2rem; line-height:1; }
        .smallify-btn.active { background:#e8d5c0; border-color:var(--accent); }
        .example-dropdown {
            position:absolute; top:100%; left:0; background:var(--card-bg);
            border:1px solid var(--border); border-radius:var(--radius-sm);
            box-shadow:var(--shadow-lg); padding:12px;
            display:none; flex-wrap:wrap; gap:8px; z-index:20;
            max-width:400px;
        }
        .course-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:6px; }
        .controls-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        .control-item {
            display:inline-flex; align-items:center; gap:6px;
            height:var(--ctrl-height);
        }
        .control-item input[type="number"] {
            width:70px; padding:0 8px; height:var(--ctrl-height); border:2px solid var(--border);
            border-radius:6px; font-family:var(--font-mono); background:var(--input-bg);
        }
        .preview-outer {
            background: var(--preview-bg); border:2px dashed var(--preview-border);
            border-radius:var(--radius); padding:16px;
            display:flex; flex-direction:column; gap:20px;
            overflow:visible;
            margin-top:8px;
        }
        .preview-checkboxes {
            display:flex; gap:12px; padding:6px 0;
            color:var(--preview-text); font-size:0.85rem;
        }
        .preview-checkboxes label { display:inline-flex; align-items:center; gap:4px; cursor:pointer; }
        .preview-row {
            background: var(--preview-card-bg); border:1px solid var(--preview-border);
            border-radius:10px; padding:12px; box-shadow:0 1px 4px rgba(0,0,0,0.3);
        }
        .preview-row-header { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:8px; color:var(--preview-text); }
        .preview-canvas-wrapper { display:flex; justify-content:flex-start; align-items:center; width:100%; overflow:visible; }
        .preview-canvas-wrapper canvas { display:block; border:1px solid var(--preview-border); background:transparent; max-width:none; height:auto; }
        .info-bar { display:flex; gap:16px; flex-wrap:wrap; font-size:0.82rem; color:var(--text-secondary); }
        .legend, .tutorial { display:flex; flex-wrap:wrap; gap:12px; font-size:0.78rem; color:var(--text-secondary); align-items:center; }
        .legend span, .tutorial span { background:#f8f5f0; padding:4px 10px; border-radius:14px; }
        .legend code, .tutorial code { font-family:var(--font-mono); background:#e8e0d2; padding:2px 6px; border-radius:4px; }
        .file-upload { display:inline-block; position:relative; overflow:hidden; height:var(--ctrl-height); }
        .file-upload input[type=file] { position:absolute; left:0; top:0; opacity:0; width:100%; height:100%; cursor:pointer; }
        #divergenceWarning {
            background: #1e1e1e; color: #e0d5c5; padding: 8px 16px;
            border-radius:8px; text-align:center; font-size:0.9rem;
        }
        .tja-only { display:none; }

        /* 模态框 */
        #mapModal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;
        }
        #mapTable th, #mapTable td { padding:6px; border-bottom:1px solid var(--border); }
        #mapTable input { width:100%; border:1px solid var(--border); padding:4px; border-radius:4px; font-family:var(--font-mono); }
        @media (max-width: 768px) {
            .app-container { padding: 16px 12px; }
            .app-header h1 { font-size: 1.5rem; }
            .textarea-wrapper textarea { font-size: 0.9rem; min-height:6em; padding:10px; }
            .btn { padding:0 12px; font-size:0.8rem; height:36px; }
            .btn-primary { padding:0 12px; }
            .btn-example { padding:4px 8px; font-size:0.7rem; height:auto; }
            .icon-btn { width:36px; height:36px; }
            .icon-btn img { width:24px; height:24px; }
            .controls-row { gap:8px; }
            .control-item input[type="number"] { width:60px; padding:0 6px; height:36px; }
            .preview-outer { padding:8px; }
            .preview-row { padding:8px; }
            #btnStyleSwitch img { width:24px; height:24px; }
            .file-upload.btn { padding:0 12px; height:36px; }
            .example-dropdown { max-width: calc(100vw - 32px); }
            .smallify-btn { height:36px; width:72px; }
            #smallifyImgBig { height:20px; }
            #smallifyImgSmall { height:13px; }
            :root { --ctrl-height: 36px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <h1>太鼓之达人图像生成器</h1>
        <p class="subtitle">Made by Doveon a.k.a meの我 & Deepseek</p>
    </div>
    <div class="input-section">
        <div class="input-row">
            <div class="textarea-wrapper">
                <textarea id="inputString" placeholder="每行一个排列，括号可跨行&#10;TJA模式下可粘贴TJA内容" wrap="off"></textarea>
            </div>
        </div>
        <div class="controls-row" id="controlsRow">
            <button class="btn" id="btnModeSwitch" style="margin-right:6px;">切换到TJA模式</button>
            <div class="control-item">
                <label for="hsInput" style="font-weight:bold;">HS</label>
                <input type="number" id="hsInput" value="1.0" step="0.1" min="0.1">
            </div>
            <button id="btnRandom" class="icon-btn" title="随机"><img src="img/Icon/Random.png" alt="随机"></button>
            <button id="invertToggle" class="icon-btn" title="颠倒"><img src="img/Icon/Abekobe.png" alt="颠倒"></button>
            <button class="icon-btn" id="btnStyleSwitch" title="切换样式">🎨</button>
            <button id="smallifyBtn" class="smallify-btn" title="大音符→小音符">
                <img id="smallifyImgBig" src="img/0/oo.png" alt="大"><span class="arrow">→</span><img id="smallifyImgSmall" src="img/0/o.png" alt="小">
            </button>
            <button class="btn" id="btnResetView">显示原谱</button>
            <button class="btn" id="btnHideBars">隐藏小节线</button>
            <button class="btn" id="btnClearBars">清除输入框小节线</button>
            <button class="btn tja-only" id="btnMergeLines">合并短行</button>
            <button class="btn tja-only" id="btnIgnoreScroll">忽略变速</button>
            <button class="btn" id="btnTJAtoText" style="display:none;">TJA转ox</button>
            <span class="file-upload btn" id="tjaUploadBtn">
                📂 加载TJA <input type="file" id="tjaFileInput" accept=".tja,.txt">
            </span>
            <div style="position:relative; display:inline-block;">
                <button class="btn" id="exampleDropdownBtn">📋 快捷示例</button>
                <div class="example-dropdown" id="exampleDropdown"></div>
            </div>
            <button class="btn btn-primary" id="btnDownloadImage">新页面查看</button>
            <button class="btn" id="btnCollapseControls" title="收起/展开功能区">收起功能区</button>
        </div>
        <div id="courseContainer" style="display:none;" class="course-row"></div>
    </div>
    <div id="divergenceWarning" style="display:none;">暂不支持谱面分歧</div>
    <div class="preview-outer" id="previewContainer">
        <div class="preview-checkboxes">
            <label><input type="checkbox" id="mergeViewCheckbox"> 多行合并</label>
            <label><input type="checkbox" id="bgMergeCheckbox"> 合并背景</label>
        </div>
        <div style="text-align:center;color:var(--preview-text);padding:30px;" id="placeholder">🎼 输入音符字符串开始预览</div>
    </div>
    <div class="info-bar" id="infoBar"></div>
    <div class="tutorial" id="tutorialBox" style="display:flex;">
        <span>高亮：<code>*</code> 后首个音符发光</span>
        <span>小节线：<code>|</code> <code>/</code> <code>\</code> 后首个音符添加小节线</span>
    </div>
    <div class="legend" id="legendBox">
        <span>默认间隔16分</span><span><code>( )</code> ×1.5</span><span><code>[ ]</code> ×2</span><span><code>{ }y</code> y分音</span>
        <span>空格空音符</span><span>o/x 小音符</span><span>O/X 大音符</span><span>c 气球</span>
        <button class="btn" id="btnEditMap" style="margin-left:auto;">✏️ 编辑映射</button>
    </div>
</div>

<!-- 映射编辑模态框 -->
<div id="mapModal">
    <div style="background:var(--card-bg); padding:20px; border-radius:var(--radius); max-width:600px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow-lg);">
        <h3 style="margin-bottom:12px;">自定义映射</h3>
        <table id="mapTable" style="width:100%; border-collapse:collapse;">
            <thead><tr><th>字符</th><th>音符</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="btn" id="btnAddMapRow" style="margin-top:8px;">➕ 添加一行</button>
        <div style="margin-top:16px; display:flex; gap:8px; justify-content:flex-end;">
            <button class="btn" id="btnSaveMap">保存并关闭</button>
            <button class="btn" id="btnCancelMap">取消</button>
        </div>
    </div>
</div>

<script>
  (() => {
    // 获取DOM元素
    const textarea = document.getElementById('inputString');
    const previewContainer = document.getElementById('previewContainer');
    const placeholder = document.getElementById('placeholder');
    const bgMergeCheckbox = document.getElementById('bgMergeCheckbox');
    const mergeViewCheckbox = document.getElementById('mergeViewCheckbox');
    const hsInput = document.getElementById('hsInput');
    const smallifyBtn = document.getElementById('smallifyBtn');
    const smallifyImgBig = document.getElementById('smallifyImgBig');
    const smallifyImgSmall = document.getElementById('smallifyImgSmall');
    const btnMergeLines = document.getElementById('btnMergeLines');
    const btnIgnoreScroll = document.getElementById('btnIgnoreScroll');
    const invertToggle = document.getElementById('invertToggle');
    const btnStyleSwitch = document.getElementById('btnStyleSwitch');
    const btnRandom = document.getElementById('btnRandom');
    const btnResetView = document.getElementById('btnResetView');
    const btnModeSwitch = document.getElementById('btnModeSwitch');
    const btnTJAtoText = document.getElementById('btnTJAtoText');
    const tjaFileInput = document.getElementById('tjaFileInput');
    const tjaUploadBtn = document.getElementById('tjaUploadBtn');
    const courseContainer = document.getElementById('courseContainer');
    const exampleDropdownBtn = document.getElementById('exampleDropdownBtn');
    const exampleDropdown = document.getElementById('exampleDropdown');
    const infoBar = document.getElementById('infoBar');
    const tutorialBox = document.getElementById('tutorialBox');
    const divergenceWarning = document.getElementById('divergenceWarning');
    const btnDownloadImage = document.getElementById('btnDownloadImage');
    const btnHideBars = document.getElementById('btnHideBars');
    const btnClearBars = document.getElementById('btnClearBars');
    const btnCollapseControls = document.getElementById('btnCollapseControls');
    const controlsRow = document.getElementById('controlsRow');
    const legendBox = document.getElementById('legendBox');
    const btnEditMap = document.getElementById('btnEditMap');
    const mapModal = document.getElementById('mapModal');
    const mapTableBody = document.querySelector('#mapTable tbody');
    const btnAddMapRow = document.getElementById('btnAddMapRow');
    const btnSaveMap = document.getElementById('btnSaveMap');
    const btnCancelMap = document.getElementById('btnCancelMap');

    // 常量
    const IMG_SMALL = 106, IMG_BIG = 160, IMG_BALLOON_W = 253, IMG_BALLOON_H = 106;
    const DEFAULT_GAP = 90, FIXED_HEIGHT = 200;
    const MAX_GAP_SUM = 64 * DEFAULT_GAP - 1;
    const styleSequence = [0, 1, 0, 2];
    let currentStyleIndex = 0, currentStyle = styleSequence[currentStyleIndex];
    let examples = [];

    // 图片对象
    const imgOSmall = new Image(), imgXSmall = new Image(), imgOBig = new Image(), imgXBig = new Image(), imgC = new Image();
    const barImage = new Image(); barImage.src = 'img/bar.png';
    const loaded = { o: false, x: false, O: false, X: false, c: false };

    let chineseNoteMap = {};
    let userChineseMap = {};
    const BASIC_NOTES = [' ', 'o', 'x', 'O', 'X', 'c'];

    const FALLBACK_TJA = `TITLE:Black Rose Apostle
SUBTITLE:--
BPM:204
WAVE:Black Rose Apostle.ogg
OFFSET:-2.603
DEMOSTART:38.185

COURSE:Oni
LEVEL:10
BALLOON:9,18
SCOREINIT:420
SCOREDIFF:100

#START
10201020,
#END`;

    // 图片加载与样式
    function updateImageSources() {
      const p = 'img/' + currentStyle + '/';
      imgOSmall.src = p+'o.png'; imgXSmall.src = p+'x.png'; imgOBig.src = p+'oo.png'; imgXBig.src = p+'xx.png'; imgC.src = p+'c.png';
      smallifyImgBig.src = p+'oo.png';
      smallifyImgSmall.src = p+'o.png';
    }

    function bindImageEvents() {
      imgOSmall.onload=()=>{ loaded.o=true; checkAllLoaded(); };
      imgOSmall.onerror=()=>{ loaded.o=false; checkAllLoaded(); };
      imgXSmall.onload=()=>{ loaded.x=true; checkAllLoaded(); };
      imgXSmall.onerror=()=>{ loaded.x=false; checkAllLoaded(); };
      imgOBig.onload=()=>{ loaded.O=true; checkAllLoaded(); };
      imgOBig.onerror=()=>{ loaded.O=false; checkAllLoaded(); };
      imgXBig.onload=()=>{ loaded.X=true; checkAllLoaded(); };
      imgXBig.onerror=()=>{ loaded.X=false; checkAllLoaded(); };
      imgC.onload=()=>{ loaded.c=true; checkAllLoaded(); };
      imgC.onerror=()=>{ loaded.c=false; checkAllLoaded(); };
    }
    updateImageSources(); bindImageEvents();

    let pendingRender = false;
    function checkAllLoaded() {
      if (pendingRender) return;
      pendingRender = true;
      requestAnimationFrame(() => { pendingRender = false; render(); });
    }

    // 状态变量
    let randomMap = null, invertActive = false, mergeViewActive = true, backgroundMergeActive = false;
    let smallifyActive = false;
    let tjaModeActive = false, tjaCourses = [], selectedCourse = null;
    let tjaMergeLinesActive = true;
    let ignoreScrollActive = false;
    let hideBars = false;
    let controlsCollapsed = false;

    // 工具函数
    function replaceChineseNotes(str) {
        let result = str;
        for (const [ch, replacement] of Object.entries(chineseNoteMap)) {
            result = result.replaceAll(ch, replacement);
        }
        return result;
    }

    function normalize(str) { return str.replace(/（/g,'(').replace(/）/g,')').replace(/【/g,'[').replace(/】/g,']').replace(/｛/g,'{').replace(/｝/g,'}').replace(/，/g,' ').replace(/,/g,' '); }

    function getGapFactor(a, b) {
        let result = 1;
        const bIds = new Set();
        for (let i = 1; i < b.length; i++) {
            if (typeof b[i] === 'object' && b[i].id !== undefined) bIds.add(b[i].id);
        }
        for (let i = 1; i < a.length; i++) {
            if (typeof a[i] === 'object' && a[i].id !== undefined && bIds.has(a[i].id)) result *= a[i].value;
        }
        return result;
    }

    function parseGlobal(input) {
        const norm = normalize(input);
        const rows = [];
        let cur = [];
        const typeStack = [], factStack = [];
        let pendHigh = false, pendBar = false, bracketIdCounter = 0;
        const curlLeftStack = []; let globalIdx = 0; const curlIntervals = [];

        function pushElement(el) { cur.push(el); globalIdx++; if (globalIdx > 1) curlIntervals.push(1); }
        function applyCurlFactor(leftGlobal, factor) {
            const rightGlobal = globalIdx - 1;
            if (rightGlobal < leftGlobal) return;
            for (let i = leftGlobal; i <= rightGlobal - 1; i++) {
                if (i < curlIntervals.length) curlIntervals[i] *= factor;
            }
        }

        for (let i = 0; i < norm.length; i++) {
            const ch = norm[i];
            if (ch === '\n') { if (cur.length) rows.push(cur); cur = []; pendHigh = false; pendBar = false; continue; }
            if (ch === '*') { pendHigh = true; continue; }
            if (ch === '|' || ch === '/' || ch === '\\') { pendBar = true; continue; }
            if ('oxOXc '.includes(ch)) {
                const el = { type: ch === ' ' ? 'space' : ch, pathFactors: [1, ...factStack], highlight: false, hasBar: false, curlGapToNext: 1 };
                if (pendHigh) { if (ch !== ' ') el.highlight = true; pendHigh = false; }
                if (pendBar) { el.hasBar = true; pendBar = false; }
                pushElement(el); continue;
            }
            if (ch === '(') { typeStack.push('('); factStack.push({value: 2/3, id: bracketIdCounter++}); }
            else if (ch === '[') { typeStack.push('['); factStack.push({value: 1/2, id: bracketIdCounter++}); }
            else if (ch === '{') { curlLeftStack.push({ startGlobalIndex: globalIdx }); }
            if (ch === ')' || ch === ']' || ch === '}') {
                if (ch === '}') {
                    let j = i+1, numStr = '';
                    while (j < norm.length && (norm[j].match(/[0-9.]/) || norm[j] === '.')) { if (norm[j] !== '\n') numStr += norm[j]; j++; }
                    const y = parseFloat(numStr) || 16; const factor = 16 / y;
                    if (curlLeftStack.length) {
                        const top = curlLeftStack[curlLeftStack.length-1];
                        const leftGlobal = top.startGlobalIndex;
                        if (globalIdx - leftGlobal === 1 && curlLeftStack.length >= 2) {
                            const secondTop = curlLeftStack[curlLeftStack.length-2];
                            applyCurlFactor(secondTop.startGlobalIndex, factor);
                            curlLeftStack.splice(curlLeftStack.length-2, 1);
                        } else { applyCurlFactor(leftGlobal, factor); curlLeftStack.pop(); }
                    }
                } else {
                    const expected = ch === ')' ? '(' : '[';
                    const idx = typeStack.lastIndexOf(expected);
                    if (idx !== -1) { typeStack.splice(idx, 1); factStack.splice(idx, 1); }
                }
                continue;
            }
            pendHigh = false; pendBar = false;
        }
        if (cur.length) rows.push(cur);
        let intervalIdx = 0;
        for (const row of rows) for (let i = 0; i < row.length; i++) {
            row[i].curlGapToNext = intervalIdx < curlIntervals.length ? curlIntervals[intervalIdx++] : 1;
        }
        return rows.filter(r => r.length > 0);
    }

    function layoutLine(elements, hsScale, baseGapForSpaceRow) {
        const pos = []; let x = 0;
        for (let i = 0; i < elements.length; i++) {
            pos.push(x);
            if (i < elements.length - 1) {
                x += DEFAULT_GAP * getGapFactor(elements[i].pathFactors, elements[i+1].pathFactors) * hsScale * (elements[i].curlGapToNext || 1);
            }
        }
        let minX = Infinity, maxX = -Infinity, firstNoteCenterX = IMG_SMALL/2;
        elements.forEach((el, idx) => {
            if (el.type === 'space') {
                if (pos[idx] < minX) minX = pos[idx];
                if (pos[idx] + IMG_SMALL > maxX) maxX = pos[idx] + IMG_SMALL;
                return;
            }
            const isBig = el.type === 'O' || el.type === 'X', size = el.type === 'c' ? IMG_BALLOON_W : (isBig ? IMG_BIG : IMG_SMALL);
            const ox = el.type === 'c' ? -0.5 : (isBig ? -(IMG_BIG-IMG_SMALL)/2 : 0);
            const left = pos[idx] + ox;
            if (left < minX) minX = left;
            if (left + size > maxX) maxX = left + size;
            if (idx === 0) firstNoteCenterX = pos[idx] + IMG_SMALL/2;
        });
        if (minX === Infinity) {
            if (baseGapForSpaceRow && elements.length === 1 && elements[0].type === 'space')
                return { elements, positions: [0], minX: 0, maxX: baseGapForSpaceRow * hsScale, width: baseGapForSpaceRow * hsScale, height: FIXED_HEIGHT, firstNoteCanvasX: IMG_SMALL/2, firstNoteCanvasY: 100 };
            minX = 0; maxX = IMG_SMALL;
        }
        return { elements, positions: pos, minX, maxX, width: maxX - minX, height: FIXED_HEIGHT, firstNoteCanvasX: firstNoteCenterX - minX, firstNoteCanvasY: 100 };
    }

    function invertType(t, inv) { if (!inv || t === 'c') return t; return {o:'x',x:'o',O:'X',X:'O'}[t] || t; }
    function smallifyType(t) { return t === 'O' ? 'o' : t === 'X' ? 'x' : t; }

    function drawLine(canvas, layout, doInvert, doSmallify, randomMapRow, hideBarLines) {
        const ctx = canvas.getContext('2d');
        canvas.width = Math.ceil(layout.width); canvas.height = FIXED_HEIGHT;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < layout.elements.length; i++) {
            const el = layout.elements[i];
            if (!el.hasBar || hideBarLines) continue;
            const centerX = layout.positions[i] + IMG_SMALL/2 - layout.minX;
            if (barImage.complete && barImage.naturalWidth > 0) {
                const bw = barImage.naturalWidth || 5, bh = barImage.naturalHeight || 200;
                ctx.drawImage(barImage, centerX - bw/2, 100 - bh/2, bw, bh);
            }
        }
        ctx.save(); ctx.translate(-layout.minX, 0);
        for (let i = layout.elements.length - 1; i >= 0; i--) {
            const el = layout.elements[i];
            if (!'oxOXc'.includes(el.type)) continue;
            let drawType = el.type;
            if (randomMapRow && randomMapRow[i]) drawType = invertType(drawType, true);
            drawType = invertType(drawType, doInvert);
            if (doSmallify && drawType !== 'c') drawType = smallifyType(drawType);
            let size, drawX, drawY, img;
            if (drawType === 'c') {
                size = IMG_BALLOON_W; drawX = layout.positions[i] - 0.5; drawY = 100 - IMG_BALLOON_H/2; img = imgC;
            } else {
                const isBig = drawType === 'O' || drawType === 'X'; size = isBig ? IMG_BIG : IMG_SMALL;
                drawY = 100 - size/2; drawX = isBig ? layout.positions[i] - (IMG_BIG-IMG_SMALL)/2 : layout.positions[i];
                img = { o: imgOSmall, x: imgXSmall, O: imgOBig, X: imgXBig }[drawType];
            }
            if (el.highlight) { ctx.shadowColor = 'white'; ctx.shadowBlur = 20; }
            if (img && loaded[drawType] && img.complete && img.naturalWidth > 0) {
                if (drawType === 'c') ctx.drawImage(img, drawX, drawY, size, IMG_BALLOON_H);
                else ctx.drawImage(img, drawX, drawY, size, size);
            } else {
                ctx.save();
                ctx.beginPath(); ctx.arc(drawX + size/2, drawY + (drawType==='c'?IMG_BALLOON_H:size)/2, size*0.42, 0, Math.PI*2);
                ctx.fillStyle = {o:'#F84828',x:'#68c0c0',O:'#F84828',X:'#68c0c0',c:'#FFD700'}[drawType] || '#aaa';
                ctx.fill(); ctx.restore();
            }
            if (el.highlight) { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }
        }
        ctx.restore();
    }

    function parseTJA(text) {
        const courses = [];
        const lines = text.split('\n');
        let currentCourse = null, inStart = false, b = 1, a = 1, buffer = '';
        let globalTitle = '';
        let globalLevel = '';
        const mapDigit = { '0':' ', '1':'o', '2':'x', '3':'O', '4':'X', '7':'c' };
        const flushBuffer = () => {
            if (!buffer) return;
            const digits = buffer.replace(/\s/g, '');
            if (!digits) { buffer = ''; return; }
            const n = digits.length, baseGap = DEFAULT_GAP * 16 * a * b / n;
            const elements = digits.split('').map(ch => ({ type: mapDigit[ch] || ' ', pathFactors: [1], hasBar: false, curlGapToNext: 1 }));
            if (elements.length) elements[0].hasBar = true;
            currentCourse.rows.push({ elements, baseGap });
            buffer = '';
        };
        for (let line of lines) {
            if (line.startsWith('TITLE:')) {
                globalTitle = line.replace('TITLE:', '').trim();
                continue;
            }
            if (line.startsWith('LEVEL:')) {
                globalLevel = line.replace('LEVEL:', '').trim();
                continue;
            }
            line = line.trim();
            const ci = line.indexOf('//'); if (ci !== -1) line = line.substring(0, ci).trim();
            if (!line) continue;
            if (line.startsWith('COURSE:')) {
                flushBuffer();
                if (currentCourse && currentCourse.rows.length) courses.push(currentCourse);
                currentCourse = { 
                    name: line.replace('COURSE:', '').trim(), 
                    rows: [], 
                    title: globalTitle,
                    level: globalLevel
                };
                inStart = false; b = 1; a = 1; buffer = '';
            } else if (line === '#START') { flushBuffer(); inStart = true; }
            else if (line === '#END') { flushBuffer(); inStart = false; }
            else if (inStart && currentCourse) {
                if (line.startsWith('#MEASURE')) {
                    flushBuffer();
                    const expr = line.replace('#MEASURE', '').trim();
                    const parts = expr.split('/');
                    a = parts.length === 2 ? parseFloat(parts[0]) / parseFloat(parts[1]) : (parseFloat(expr) || 1);
                } else if (line.startsWith('#SCROLL')) {
                    if (!ignoreScrollActive) {
                        const val = parseFloat(line.replace('#SCROLL', '').trim());
                        if (!isNaN(val)) b = val;
                    }
                } else if (line.startsWith('#BPMCHANGE')) {
                } else if (!line.startsWith('#')) {
                    const clean = line.replace(/\s/g, '');
                    if (clean === ',' || clean === '') {
                        flushBuffer();
                        currentCourse.rows.push({ elements: [{ type: 'space', pathFactors: [1], hasBar: true, curlGapToNext: 1 }], baseGap: DEFAULT_GAP * 16 * a * b });
                    } else {
                        buffer += clean;
                        while (buffer.includes(',')) {
                            const idx = buffer.indexOf(',');
                            const seg = buffer.substring(0, idx); buffer = buffer.substring(idx + 1);
                            if (seg) {
                                const n = seg.length, baseGap = DEFAULT_GAP * 16 * a * b / n;
                                const elements = seg.split('').map(ch => ({ type: mapDigit[ch] || ' ', pathFactors: [1], hasBar: false }));
                                if (elements.length) elements[0].hasBar = true;
                                currentCourse.rows.push({ elements, baseGap });
                            } else {
                                currentCourse.rows.push({ elements: [{ type: 'space', pathFactors: [1], hasBar: true }], baseGap: DEFAULT_GAP * 16 * a * b });
                            }
                        }
                    }
                }
            }
        }
        flushBuffer();
        if (currentCourse && currentCourse.rows.length) courses.push(currentCourse);
        return courses;
    }

    function convertTJAtoText(courseRows) {
        return courseRows.map(row => {
            const notes = row.elements.map(el => el.type === 'space' ? ' ' : el.type).join('');
            const y = row.baseGap > 0 ? 1440 / row.baseGap : 16;
            if (Math.abs(y - 16) < 0.001) return notes;
            const yStr = Number.isInteger(y) ? y.toString() : y.toFixed(4).replace(/0+$/, '').replace(/\.$/, '');
            return `{${notes}}${yStr}`;
        }).join('\n');
    }

    function mergeTJARows(rows, hsScale) {
        const layouts = [];
        let group = { elements: [], positions: [], gapSum: 0, gapToNext: 0, rowCount: 0 };
        for (const row of rows) {
            const scaledBase = row.baseGap * hsScale;
            const isSpace = row.elements.length === 1 && row.elements[0].type === 'space';
            const curGapSum = isSpace ? scaledBase : scaledBase * (row.elements.length - 1);
            const gapBetween = group.rowCount > 0 ? group.gapToNext : 0;
            if (group.rowCount === 0 || group.gapSum + gapBetween + curGapSum <= MAX_GAP_SUM) {
                if (group.rowCount > 0) group.positions.push(group.positions[group.positions.length-1] + group.gapToNext);
                for (let i = 0; i < row.elements.length; i++) {
                    const el = { ...row.elements[i], hasBar: row.elements[i].hasBar };
                    if (isSpace) el.spaceWidth = scaledBase;
                    group.elements.push(el);
                    if (i === 0 && group.rowCount === 0) group.positions.push(0);
                    else if (i > 0) group.positions.push(group.positions[group.positions.length-1] + scaledBase);
                }
                group.gapSum = curGapSum + (group.rowCount > 0 ? gapBetween : 0) + group.gapSum;
                group.gapToNext = scaledBase; group.rowCount++;
            } else {
                if (group.rowCount > 0) layouts.push(buildLayoutFromGroup(group));
                group = { elements: [], positions: [], gapSum: 0, gapToNext: 0, rowCount: 0 };
                for (let i = 0; i < row.elements.length; i++) {
                    const el = { ...row.elements[i], hasBar: row.elements[i].hasBar && i === 0 };
                    if (isSpace) el.spaceWidth = scaledBase;
                    group.elements.push(el);
                    if (i === 0) group.positions.push(0);
                    else group.positions.push(group.positions[group.positions.length-1] + scaledBase);
                }
                group.gapSum = curGapSum; group.gapToNext = scaledBase; group.rowCount = 1;
            }
        }
        if (group.rowCount > 0) layouts.push(buildLayoutFromGroup(group));
        return layouts;
    }

    function buildLayoutFromGroup(group) {
        const elements = group.elements, positions = group.positions;
        let minX = Infinity, maxX = -Infinity, firstNoteCenterX = IMG_SMALL/2;
        elements.forEach((el, idx) => {
            if (el.type === 'space') {
                if (positions[idx] < minX) minX = positions[idx];
                if (el.spaceWidth) maxX = Math.max(maxX, positions[idx] + el.spaceWidth);
                else maxX = Math.max(maxX, positions[idx] + IMG_SMALL);
                return;
            }
            const isBig = el.type === 'O' || el.type === 'X', size = el.type === 'c' ? IMG_BALLOON_W : (isBig ? IMG_BIG : IMG_SMALL);
            const ox = el.type === 'c' ? -0.5 : (isBig ? -(IMG_BIG-IMG_SMALL)/2 : 0);
            const left = positions[idx] + ox;
            if (left < minX) minX = left;
            if (left + size > maxX) maxX = left + size;
            if (idx === 0) firstNoteCenterX = positions[idx] + IMG_SMALL/2;
        });
        if (minX === Infinity) { minX = 0; maxX = IMG_SMALL; }
        return { elements, positions, minX, maxX, width: maxX - minX, height: FIXED_HEIGHT, firstNoteCanvasX: firstNoteCenterX - minX, firstNoteCanvasY: 100 };
    }

    let currentRowLayouts = [];

    function render() {
        let rowLayouts;
        const hsVal = parseFloat(hsInput.value); const hsScale = isNaN(hsVal) || hsVal <= 0 ? 1 : hsVal;
        const doInvert = invertActive, doSmallify = smallifyActive;
        tutorialBox.style.display = tjaModeActive ? 'none' : 'flex';
        divergenceWarning.style.display = tjaModeActive ? 'block' : 'none';
        if (tjaModeActive && selectedCourse) {
            rowLayouts = tjaMergeLinesActive ? mergeTJARows(selectedCourse.rows, hsScale) :
                selectedCourse.rows.map(row => {
                    if (row.elements.length === 1 && row.elements[0].type === 'space') return layoutLine(row.elements, hsScale, row.baseGap);
                    return layoutLine(row.elements, hsScale);
                }).filter(l => l.elements.some(e => e.type !== 'space') || l.width > 0);
        } else {
            const rows = parseGlobal(replaceChineseNotes(textarea.value));
            rowLayouts = rows.map(e => layoutLine(e, hsScale)).filter(l => l.elements.some(e => e.type !== 'space'));
        }
        currentRowLayouts = rowLayouts;
        const modeInfo = tjaModeActive ? (tjaMergeLinesActive ? '合并短行' : '原始分行') : 'ox模式';
        infoBar.innerHTML = `行数:${rowLayouts.length} | 音符:${rowLayouts.reduce((s,l)=>s+l.elements.filter(e=>e.type!=='space').length,0)} | HS:${hsScale.toFixed(2)} | 样式:${currentStyle} | ${modeInfo}`;
        previewContainer.querySelectorAll('.preview-row').forEach(el => el.remove());
        if (!rowLayouts.length) { placeholder.style.display = 'block'; return; }
        placeholder.style.display = 'none';

        if (mergeViewActive || backgroundMergeActive) {
            const rowCanvases = rowLayouts.map((l,i) => { const c = document.createElement('canvas'); drawLine(c, l, doInvert, doSmallify, randomMap?.[i], hideBars); return { canvas: c, firstX: l.firstNoteCanvasX, firstY: 100 }; });
            const maxFirstX = Math.max(...rowCanvases.map(r => r.firstX));
            const infoHeight = tjaModeActive && selectedCourse ? FIXED_HEIGHT : 0;
            const musicStartY = infoHeight;
            const finalHeight = musicStartY + 100 + (rowLayouts.length-1)*200 + 100;
            const maxWidth = Math.max(...rowCanvases.map((r,i) => (maxFirstX - r.firstX) + r.canvas.width));
            const merged = document.createElement('canvas'); merged.width = Math.ceil(maxWidth); merged.height = Math.ceil(finalHeight);
            const ctx = merged.getContext('2d');
            if (backgroundMergeActive) { ctx.fillStyle = '#272727'; ctx.fillRect(0,0,merged.width,merged.height); }

            // 绘制信息行
            if (tjaModeActive && selectedCourse) {
                const title = selectedCourse.title || '';
                const difficulty = selectedCourse.name || '';
                const level = selectedCourse.level || '';
                const infoText = difficulty + (level ? level : '');
                ctx.save();
                ctx.font = 'bold 90px "DFPKanteiryu", "KaiTi", sans-serif';  // 原30 → 90
                ctx.fillStyle = '#e0d5c5';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 4;
                ctx.fillText(title, 12, 90);      // 原40 → 90
                if (infoText) {
                    ctx.font = 'bold 72px "DFPKanteiryu", "KaiTi", sans-serif';  // 原24 → 72
                    ctx.fillText(infoText, 12, 180);                              // 原76 → 180
                }
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            let y = musicStartY;
            rowLayouts.forEach((l,i) => {
                ctx.drawImage(rowCanvases[i].canvas, maxFirstX - rowCanvases[i].firstX, y - 100);
                if (i < rowLayouts.length - 1) y += 200;
            });

            const div = document.createElement('div'); div.className = 'preview-row';
            div.innerHTML = `<div class="preview-row-header"><span>${backgroundMergeActive ? '合并背景' : '合并多行'} (${rowLayouts.length}行)</span></div>`;
            const wrap = document.createElement('div'); wrap.className = 'preview-canvas-wrapper'; wrap.appendChild(merged); div.appendChild(wrap);
            previewContainer.appendChild(div);
            const scale = Math.min(1, (previewContainer.clientWidth-32) / maxWidth);
            merged.style.width = merged.width * scale + 'px'; merged.style.height = merged.height * scale + 'px';
        } else {
            const maxFirstX = Math.max(...rowLayouts.map(l => l.firstNoteCanvasX));
            rowLayouts.forEach((l,i) => {
                const orig = document.createElement('canvas'); drawLine(orig, l, doInvert, doSmallify, randomMap?.[i], hideBars);
                const extra = maxFirstX - l.firstNoteCanvasX;
                const final = document.createElement('canvas'); final.width = Math.ceil(extra + l.width); final.height = FIXED_HEIGHT;
                final.getContext('2d').drawImage(orig, extra, 0);
                const div = document.createElement('div'); div.className = 'preview-row';
                div.innerHTML = `<div class="preview-row-header"><span>第${i+1}行 (${l.elements.filter(e=>e.type!=='space').length}音符)</span></div>`;
                const wrap = document.createElement('div'); wrap.className = 'preview-canvas-wrapper'; wrap.appendChild(final); div.appendChild(wrap);
                previewContainer.appendChild(div);
            });
            const allC = previewContainer.querySelectorAll('canvas:not(.preview-checkboxes canvas)');
            const maxW = Math.max(...Array.from(allC).map(c => c.width));
            const scale = Math.min(1, (previewContainer.clientWidth-32) / maxW);
            allC.forEach(c => { c.style.width = c.width * scale + 'px'; c.style.height = c.height * scale + 'px'; });
        }
    }

    async function loadChineseMap() {

            const response = await fetch('map.txt');

                chineseNoteMap = parseChineseMap(text);

                chineseNoteMap = getFallbackChineseMap();

    function parseChineseMap(text) {
        const map = {};
        const lines = text.split('\n');
        let currentTarget = null;
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#')) {
                currentTarget = line.substring(1).trim();
            } else if (line && currentTarget) {
                const chars = line.split(/[ \t]+/);
                for (const ch of chars) {
                    if (ch) map[ch] = currentTarget;
                }
            }
        }
        return map;
    }

        btnModeSwitch.textContent = '切换到ox模式';
        updateTjaModeUI();
        const tjaContent = await loadExternalTJA();
        textarea.value = tjaContent;
        tjaCourses = parseTJA(tjaContent);
        updateCourseButtons();
        selectedCourse = tjaCourses.length ? tjaCourses[0] : null;
        render();
    }

    function exitTJAMode(clearText = true) {
        tjaModeActive = false;
        btnModeSwitch.textContent = '切换到TJA模式';
        updateTjaModeUI();
        if (clearText) textarea.value = '';
        courseContainer.style.display = 'none';
        selectedCourse = null;
        render();
    }

    btnModeSwitch.addEventListener('click', () => {
        if (tjaModeActive) exitTJAMode(true);
        else enterTJAMode();
    });

    btnTJAtoText.addEventListener('click', () => {
        if (!selectedCourse) return;
        textarea.value = convertTJAtoText(selectedCourse.rows);
        exitTJAMode(false);
    });

    tjaFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            textarea.value = ev.target.result;
            if (tjaModeActive) {
                tjaCourses = parseTJA(textarea.value);
                updateCourseButtons();
                selectedCourse = tjaCourses.length ? tjaCourses[0] : null;
            }
            render();
        };
        reader.readAsText(file);
    });

    textarea.addEventListener('input', () => {
        if (tjaModeActive) {
            tjaCourses = parseTJA(textarea.value);
            updateCourseButtons();
            selectedCourse = tjaCourses.length ? tjaCourses[0] : null;
        }
        render();
    });
    hsInput.addEventListener('input', render);

    btnMergeLines.addEventListener('click', () => {
        tjaMergeLinesActive = !tjaMergeLinesActive;
        btnMergeLines.classList.toggle('active', tjaMergeLinesActive);
        render();
    });
    btnIgnoreScroll.addEventListener('click', () => {
        ignoreScrollActive = !ignoreScrollActive;
        btnIgnoreScroll.classList.toggle('active', ignoreScrollActive);
        if (tjaModeActive) {
            const prevCourseName = selectedCourse ? selectedCourse.name : null;
            tjaCourses = parseTJA(textarea.value);
            updateCourseButtons();
            selectedCourse = prevCourseName ? tjaCourses.find(c => c.name === prevCourseName) : (tjaCourses.length ? tjaCourses[0] : null);
        }
        render();
    });

    mergeViewCheckbox.addEventListener('change', () => {
        mergeViewActive = mergeViewCheckbox.checked;
        if (mergeViewActive) { backgroundMergeActive = false; bgMergeCheckbox.checked = false; }
        render();
    });
    bgMergeCheckbox.addEventListener('change', () => {
    backgroundMergeActive = bgMergeCheckbox.checked;
        if (backgroundMergeActive) { 
            mergeViewActive = false; 
            mergeViewCheckbox.checked = false;
        }
        render();
    });

    invertToggle.addEventListener('click', () => { invertActive = !invertActive; invertToggle.classList.toggle('active', invertActive); render(); });
    btnRandom.addEventListener('click', () => {
        if (!currentRowLayouts.length) return;
        randomMap = currentRowLayouts.map(l => l.elements.map(e => e.type !== 'space' && Math.random() < 0.5));
        render();
    });
    btnResetView.addEventListener('click', () => {
        invertActive = false; invertToggle.classList.remove('active');
        smallifyActive = false; smallifyBtn.classList.remove('active');
        randomMap = null; hideBars = false; btnHideBars.textContent = '隐藏小节线';
        render();
    });
    btnStyleSwitch.addEventListener('click', () => {
        currentStyleIndex = (currentStyleIndex + 1) % styleSequence.length;
        currentStyle = styleSequence[currentStyleIndex];
        loaded.o = loaded.x = loaded.O = loaded.X = loaded.c = false;
        updateImageSources(); bindImageEvents();
        updateStyleButtonIcon();
        render();
    });
    smallifyBtn.addEventListener('click', () => {
        smallifyActive = !smallifyActive;
        smallifyBtn.classList.toggle('active', smallifyActive);
        render();
    });
    btnHideBars.addEventListener('click', () => {
        hideBars = !hideBars;
        btnHideBars.textContent = hideBars ? '显示小节线' : '隐藏小节线';
        render();
    });
    btnClearBars.addEventListener('click', () => {
        const cleaned = textarea.value.replace(/[|/\\]/g, '');
        textarea.value = cleaned;
        if (tjaModeActive) {
            tjaCourses = parseTJA(cleaned);
            updateCourseButtons();
            selectedCourse = tjaCourses.length ? tjaCourses[0] : null;
        }
        render();
    });

    btnCollapseControls.addEventListener('click', () => {
        controlsCollapsed = !controlsCollapsed;
        if (controlsCollapsed) {
            Array.from(controlsRow.children).forEach(child => {
                if (child !== btnCollapseControls) child.style.display = 'none';
            });
            courseContainer.style.display = 'none';
            infoBar.style.display = 'none';
            tutorialBox.style.display = 'none';
            legendBox.style.display = 'none';
            divergenceWarning.style.display = 'none';
            btnCollapseControls.textContent = '展开功能区';
        } else {
            Array.from(controlsRow.children).forEach(child => {
                if (child !== btnCollapseControls && child !== btnModeSwitch) child.style.display = '';
            });
            updateTjaModeUI();
            infoBar.style.display = '';
            tutorialBox.style.display = tjaModeActive ? 'none' : 'flex';
            legendBox.style.display = tjaModeActive ? 'none' : '';
            divergenceWarning.style.display = tjaModeActive ? 'block' : 'none';
            btnCollapseControls.textContent = '收起功能区';
        }
        btnModeSwitch.style.display = '';
        btnCollapseControls.style.display = '';
    });

    btnDownloadImage.addEventListener('click', () => {
        if (!currentRowLayouts.length) return;
        const doInvert = invertActive, doSmallify = smallifyActive;
        const rowCanvases = currentRowLayouts.map((l,i) => {
            const c = document.createElement('canvas'); drawLine(c, l, doInvert, doSmallify, randomMap?.[i], hideBars);
            return { canvas: c, firstX: l.firstNoteCanvasX, firstY: 100 };
        });
        const maxFirstX = Math.max(...rowCanvases.map(r => r.firstX));
        const maxWidth = Math.max(...rowCanvases.map((r,i) => (maxFirstX - r.firstX) + r.canvas.width));
        const infoHeight = tjaModeActive && selectedCourse ? FIXED_HEIGHT : 0;
        const finalHeight = infoHeight + 100 + (currentRowLayouts.length-1)*200 + 100;
        const mergedCanvas = document.createElement('canvas'); mergedCanvas.width = Math.ceil(maxWidth); mergedCanvas.height = Math.ceil(finalHeight);
        const ctx = mergedCanvas.getContext('2d');
        if (backgroundMergeActive) { ctx.fillStyle = '#272727'; ctx.fillRect(0,0,mergedCanvas.width,mergedCanvas.height); }

        if (tjaModeActive && selectedCourse) {
            const title = selectedCourse.title || '';
            const difficulty = selectedCourse.name || '';
            const level = selectedCourse.level || '';
            const infoText = difficulty + (level ? level : '');
            ctx.save();
            ctx.font = 'bold 90px "DFPKanteiryu", "KaiTi", sans-serif';
            ctx.fillStyle = '#e0d5c5';
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 4;
            ctx.fillText(title, 12, 90);
            if (infoText) {
                ctx.font = 'bold 72px "DFPKanteiryu", "KaiTi", sans-serif';
                ctx.fillText(infoText, 12, 180);
            }
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.restore();
        }
        let y = infoHeight;
        currentRowLayouts.forEach((l,i) => {
            ctx.drawImage(rowCanvases[i].canvas, maxFirstX - rowCanvases[i].firstX, y - 100);
            if (i < currentRowLayouts.length - 1) y += 200;
        });
        const dataURL = mergedCanvas.toDataURL('image/png');
        const newWindow = window.open('');
        if (newWindow) {
            newWindow.document.write(`<img src="${dataURL}" style="max-width:100%; height:auto; background:#272727;" />`);
            newWindow.document.title = '预览图片 - 太鼓图像生成器';
        } else alert('请允许弹出窗口以查看图片');
    });

    exampleDropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleExampleDropdown();
    });

    function toggleExampleDropdown() {
        exampleDropdown.style.display = exampleDropdown.style.display === 'flex' ? 'none' : 'flex';
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('#exampleDropdownBtn') && !e.target.closest('#exampleDropdown')) {
            exampleDropdown.style.display = 'none';
        }
    });

    function updateStyleButtonIcon() {
        const nextStyle = styleSequence[(currentStyleIndex + 1) % styleSequence.length];
        btnStyleSwitch.innerHTML = '';
        const img = document.createElement('img');
        img.src = `img/${nextStyle}/o.png`; img.alt = '样式'; img.style.width = '28px'; img.style.height = '28px';
        img.onerror = () => { btnStyleSwitch.textContent = '🎨'; };
        btnStyleSwitch.appendChild(img);
        smallifyImgBig.src = `img/${nextStyle}/oo.png`;
        smallifyImgSmall.src = `img/${nextStyle}/o.png`;
    }

    function renderExamples() {
        exampleDropdown.innerHTML = '';
        examples.forEach(ex => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-example';
            btn.textContent = ex.label;
            btn.addEventListener('click', (e) => {
                textarea.value = ex.value.replace(/\\n/g, '\n');
                if (tjaModeActive) {
                    tjaModeActive = false;
                    btnModeSwitch.textContent = '切换到TJA模式';
                    updateTjaModeUI();
                }
                courseContainer.style.display = 'none';
                exampleDropdown.style.display = 'none';
                render();
                e.stopPropagation();
            });
            exampleDropdown.appendChild(btn);
        });
    }

    // 初始化
    updateStyleButtonIcon();
    async function loadCustomFont() {
        const font = new FontFace('DFPKanteiryu', 'url(Font/Modified-DFPKanteiryu-XB.ttf)');
        try {
            await font.load();
            document.fonts.add(font);
            console.log('毛笔字体加载成功');
        } catch (e) {
            console.warn('毛笔字体加载失败，将使用默认字体', e);
        }
    }
    async function initialize() {
        await loadCustomFont();
        await loadChineseMap();
        await loadExamples();
        updateTjaModeUI();
        textarea.value = '(ooxooxooxooxooox)ox(ooox)ox(oxooox)';
        textarea.setAttribute('wrap', 'off');
        mergeViewCheckbox.checked = true;   // 默认多行合并
        render();
    }
    initialize();
  })();
</script>
</body>
</html>
