<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太鼓之达人图像生成器</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --text: #2c2416;
            --text-secondary: #6b5e4a;
            --border: #e0d5c5;
            --accent: #c17f59;
            --accent-hover: #a06b48;
            --input-bg: #fdfaf6;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
            --font-mono: 'SF Mono','Cascadia Code','Consolas','Monaco','Menlo',monospace;
            --preview-bg: #272727;
            --preview-card-bg: #1e1e1e;
            --preview-text: #e0d5c5;
            --preview-border: #4a3f35;
            --ctrl-height: 40px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height:100vh;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            padding:12px;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(193,127,89,0.06) 0%, transparent 60%),
            radial-gradient(ellipse at 70% 80%, rgba(160,140,110,0.05) 0%, transparent 60%);
        }
        .app-container { width:100%; max-width:1300px; background:var(--card-bg); border-radius:20px; box-shadow:var(--shadow-lg); padding:32px 28px; display:flex; flex-direction:column; gap:16px; }
        .app-header h1 { font-size:2rem; font-weight:700; text-align:center; }
        .subtitle { text-align:center; font-size:0.95rem; color:var(--text-secondary); }
        .input-section { display:flex; flex-direction:column; gap:12px; }
        .input-row { display:flex; gap:10px; align-items:stretch; flex-wrap:wrap; }
        .textarea-wrapper { flex:1; min-width:280px; display:flex; }
        .textarea-wrapper textarea {
            flex:1; padding:14px 16px; font-size:1.05rem; font-family:var(--font-mono);
            letter-spacing:0.04em; border:2px solid var(--border); border-radius:var(--radius);
            background:var(--input-bg); color:var(--text); outline:none; resize:vertical;
            line-height:1.6; min-height:10em; white-space:pre; overflow-x:auto; wrap:off;
        }
        .btn {
            padding:0 16px; border:none; border-radius:var(--radius-sm); cursor:pointer;
            font-size:0.9rem; font-weight:600; display:inline-flex; align-items:center; gap:6px;
            background:#f8f5f0; color:var(--text-secondary); border:1.5px solid var(--border);
            white-space:nowrap; height:var(--ctrl-height);
        }
        .btn-primary { background:var(--accent); color:#fff; border:none; }
        .btn-primary:hover { background:var(--accent-hover); }
        .btn:hover { background:#f0ebe0; }
        .btn.active { background:#e8d5c0; border-color:var(--accent); }
        .btn-example { padding:6px 12px; font-size:0.85rem; font-family:var(--font-mono); height:auto; }
        .icon-btn {
            width:var(--ctrl-height); height:var(--ctrl-height); padding:2px; background:#f8f5f0;
            border:1.5px solid var(--border); border-radius:8px; cursor:pointer;
            display:inline-flex; align-items:center; justify-content:center;
            font-weight:700; font-size:1rem; flex-shrink:0;
        }
        .icon-btn img { width:28px; height:28px; object-fit:contain; }
        .icon-btn.active { background:#e8d5c0; border-color:var(--accent); }
        #btnStyleSwitch { padding:2px; }
        #btnStyleSwitch img { max-width:28px; max-height:28px; }
        .smallify-btn {
            height:var(--ctrl-height); width:calc(var(--ctrl-height)*2);
            background:#f8f5f0; border:1.5px solid var(--border); border-radius:8px;
            cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
            gap:4px; padding:2px; flex-shrink:0;
        }
        #smallifyImgBig { height:24px; object-fit:contain; }
        #smallifyImgSmall { height:16px; object-fit:contain; }
        .smallify-btn .arrow { font-size:1.2rem; line-height:1; }
        .smallify-btn.active { background:#e8d5c0; border-color:var(--accent); }
        .example-dropdown {
            position:absolute; top:100%; left:0; background:var(--card-bg);
            border:1px solid var(--border); border-radius:var(--radius-sm);
            box-shadow:var(--shadow-lg); padding:12px;
            display:none; flex-wrap:wrap; gap:8px; z-index:20;
            max-width:400px;
        }
        .course-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:6px; }
        .controls-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        .control-item { display:inline-flex; align-items:center; gap:6px; height:var(--ctrl-height); }
        .control-item input[type="number"] {
            width:70px; padding:0 8px; height:var(--ctrl-height); border:2px solid var(--border);
            border-radius:6px; font-family:var(--font-mono); background:var(--input-bg);
        }
        .preview-outer {
            background: var(--preview-bg); border:2px dashed var(--preview-border);
            border-radius:var(--radius); padding:16px;
            display:flex; flex-direction:column; gap:20px;
            overflow:visible; margin-top:8px;
        }
        .preview-checkboxes {
            display:flex; gap:12px; padding:6px 0;
            color:var(--preview-text); font-size:0.85rem;
        }
        .preview-checkboxes label { display:inline-flex; align-items:center; gap:4px; cursor:pointer; }
        .preview-row {
            background: var(--preview-card-bg); border:1px solid var(--preview-border);
            border-radius:10px; padding:12px; box-shadow:0 1px 4px rgba(0,0,0,0.3);
        }
        .preview-row-header { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:8px; color:var(--preview-text); }
        .preview-canvas-wrapper { display:flex; justify-content:flex-start; align-items:center; width:100%; overflow:visible; }
        .preview-canvas-wrapper canvas { display:block; border:1px solid var(--preview-border); background:transparent; max-width:none; height:auto; }
        .info-bar { display:flex; gap:16px; flex-wrap:wrap; font-size:0.82rem; color:var(--text-secondary); }
        .legend, .tutorial { display:flex; flex-wrap:wrap; gap:12px; font-size:0.78rem; color:var(--text-secondary); align-items:center; }
        .legend span, .tutorial span { background:#f8f5f0; padding:4px 10px; border-radius:14px; }
        .legend code, .tutorial code { font-family:var(--font-mono); background:#e8e0d2; padding:2px 6px; border-radius:4px; }
        .file-upload { display:inline-block; position:relative; overflow:hidden; height:var(--ctrl-height); }
        .file-upload input[type=file] { position:absolute; left:0; top:0; opacity:0; width:100%; height:100%; cursor:pointer; }
        #divergenceWarning { background: #1e1e1e; color: #e0d5c5; padding: 8px 16px; border-radius:8px; text-align:center; font-size:0.9rem; }
        .tja-only { display:none; }
        #mapModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
        #mapTable th, #mapTable td { padding:6px; border-bottom:1px solid var(--border); }
        #mapTable input { width:100%; border:1px solid var(--border); padding:4px; border-radius:4px; font-family:var(--font-mono); }
        @media (max-width: 768px) {
            .app-container { padding: 16px 12px; }
            .app-header h1 { font-size: 1.5rem; }
            .textarea-wrapper textarea { font-size: 0.9rem; min-height:6em; padding:10px; }
            .btn { padding:0 12px; font-size:0.8rem; height:36px; }
            .btn-primary { padding:0 12px; }
            .btn-example { padding:4px 8px; font-size:0.7rem; height:auto; }
            .icon-btn { width:36px; height:36px; }
            .icon-btn img { width:24px; height:24px; }
            .controls-row { gap:8px; }
            .control-item input[type="number"] { width:60px; padding:0 6px; height:36px; }
            .preview-outer { padding:8px; }
            .preview-row { padding:8px; }
            #btnStyleSwitch img { width:24px; height:24px; }
            .file-upload.btn { padding:0 12px; height:36px; }
            .example-dropdown { max-width: calc(100vw - 32px); }
            .smallify-btn { height:36px; width:72px; }
            #smallifyImgBig { height:20px; }
            #smallifyImgSmall { height:13px; }
            :root { --ctrl-height: 36px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <h1>太鼓之达人图像生成器</h1>
        <p class="subtitle">Made by Doveon a.k.a meの我 & Deepseek</p>
    </div>
    <div class="input-section">
        <div class="input-row">
            <div class="textarea-wrapper">
                <textarea id="inputString" placeholder="每行一个排列，括号可跨行&#10;TJA模式下可粘贴TJA内容" wrap="off"></textarea>
            </div>
        </div>
        <div class="controls-row" id="controlsRow">
            <button class="btn" id="btnModeSwitch">切换到TJA模式</button>
            <div class="control-item">
                <label for="hsInput" style="font-weight:bold;">HS</label>
                <input type="number" id="hsInput" value="1.0" step="0.1" min="0.1">
            </div>
            <button id="btnRandom" class="icon-btn" title="随机"><img src="img/Icon/Random.png" alt="随机"></button>
            <button id="invertToggle" class="icon-btn" title="颠倒"><img src="img/Icon/Abekobe.png" alt="颠倒"></button>
            <button class="icon-btn" id="btnStyleSwitch" title="切换样式">🎨</button>
            <button id="smallifyBtn" class="smallify-btn" title="大音符→小音符">
                <img id="smallifyImgBig" src="img/0/oo.png" alt="大"><span class="arrow">→</span><img id="smallifyImgSmall" src="img/0/o.png" alt="小">
            </button>
            <button class="btn" id="btnResetView">显示原谱</button>
            <button class="btn" id="btnHideBars">隐藏小节线</button>
            <button class="btn" id="btnClearBars">清除输入框小节线</button>
            <button class="btn tja-only" id="btnMergeLines">合并短行</button>
            <button class="btn tja-only" id="btnIgnoreScroll">注重目视（测试版）</button>
            <button class="btn" id="btnTJAtoText" style="display:none;">TJA转ox</button>
            <span class="file-upload btn" id="tjaUploadBtn">
                📂 加载TJA <input type="file" id="tjaFileInput" accept=".tja,.txt">
            </span>
            <div style="position:relative; display:inline-block;">
                <button class="btn" id="exampleDropdownBtn">📋 快捷示例</button>
                <div class="example-dropdown" id="exampleDropdown"></div>
            </div>
            <button class="btn btn-primary" id="btnDownloadImage">新页面查看</button>
            <button class="btn" id="btnCollapseControls" title="收起/展开功能区">收起功能区</button>
        </div>
        <div id="courseContainer" style="display:none;" class="course-row"></div>
    </div>
    <div id="divergenceWarning" style="display:none;">暂不支持谱面分歧</div>
    <div class="preview-outer" id="previewContainer">
        <div class="preview-checkboxes">
            <label><input type="checkbox" id="mergeViewCheckbox" checked> 多行合并</label>
            <label><input type="checkbox" id="bgMergeCheckbox"> 合并背景</label>
        </div>
        <div style="text-align:center;color:var(--preview-text);padding:30px;" id="placeholder">🎼 输入音符字符串开始预览</div>
    </div>
    <div class="info-bar" id="infoBar"></div>
    <div class="tutorial" id="tutorialBox">
        <span>高亮：<code>*</code> 后首个音符发光</span>
        <span>小节线：<code>|</code> <code>/</code> <code>\</code></span>
        <span>长条：<code>l...l</code> 小 <code>L...L</code> 大</span>
    </div>
    <div class="legend" id="legendBox">
        <span>默认间隔16分</span><span><code>( )</code> ×1.5</span><span><code>[ ]</code> ×2</span><span><code>{ }y</code> y分音</span>
        <span>空格空音符</span><span>o/x 小</span><span>O/X 大</span><span>c 气球</span><span>l/L 长条</span>
        <button class="btn" id="btnEditMap" style="margin-left:auto;">✏️ 编辑映射</button>
    </div>
</div>
<div id="mapModal">
    <div style="background:var(--card-bg); padding:20px; border-radius:var(--radius); max-width:600px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow-lg);">
        <h3 style="margin-bottom:12px;">自定义映射</h3>
        <table id="mapTable" style="width:100%; border-collapse:collapse;">
            <thead><tr><th>字符</th><th>音符</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="btn" id="btnAddMapRow" style="margin-top:8px;">➕ 添加一行</button>
        <div style="margin-top:16px; display:flex; gap:8px; justify-content:flex-end;">
            <button class="btn" id="btnSaveMap">保存</button>
            <button class="btn" id="btnCancelMap">取消</button>
        </div>
    </div>
</div>

<script>
(() => {
    // ----- DOM 元素 -----
    const textarea = document.getElementById('inputString');
    const previewContainer = document.getElementById('previewContainer');
    const placeholder = document.getElementById('placeholder');
    const bgMergeCheckbox = document.getElementById('bgMergeCheckbox');
    const mergeViewCheckbox = document.getElementById('mergeViewCheckbox');
    const hsInput = document.getElementById('hsInput');
    const smallifyBtn = document.getElementById('smallifyBtn');
    const smallifyImgBig = document.getElementById('smallifyImgBig');
    const smallifyImgSmall = document.getElementById('smallifyImgSmall');
    const btnMergeLines = document.getElementById('btnMergeLines');
    const btnIgnoreScroll = document.getElementById('btnIgnoreScroll');
    const invertToggle = document.getElementById('invertToggle');
    const btnStyleSwitch = document.getElementById('btnStyleSwitch');
    const btnRandom = document.getElementById('btnRandom');
    const btnResetView = document.getElementById('btnResetView');
    const btnModeSwitch = document.getElementById('btnModeSwitch');
    const btnTJAtoText = document.getElementById('btnTJAtoText');
    const tjaFileInput = document.getElementById('tjaFileInput');
    const tjaUploadBtn = document.getElementById('tjaUploadBtn');
    const courseContainer = document.getElementById('courseContainer');
    const exampleDropdownBtn = document.getElementById('exampleDropdownBtn');
    const exampleDropdown = document.getElementById('exampleDropdown');
    const infoBar = document.getElementById('infoBar');
    const tutorialBox = document.getElementById('tutorialBox');
    const divergenceWarning = document.getElementById('divergenceWarning');
    const btnDownloadImage = document.getElementById('btnDownloadImage');
    const btnHideBars = document.getElementById('btnHideBars');
    const btnClearBars = document.getElementById('btnClearBars');
    const btnCollapseControls = document.getElementById('btnCollapseControls');
    const controlsRow = document.getElementById('controlsRow');
    const legendBox = document.getElementById('legendBox');
    const btnEditMap = document.getElementById('btnEditMap');
    const mapModal = document.getElementById('mapModal');
    const mapTableBody = document.querySelector('#mapTable tbody');
    const btnAddMapRow = document.getElementById('btnAddMapRow');
    const btnSaveMap = document.getElementById('btnSaveMap');
    const btnCancelMap = document.getElementById('btnCancelMap');

    // ----- 常量与全局变量 -----
    const IMG_SMALL = 106, IMG_BIG = 160, IMG_BALLOON_W = 253, IMG_BALLOON_H = 106;
    const DEFAULT_GAP = 90, FIXED_HEIGHT = 200, MAX_GAP_SUM = 64*DEFAULT_GAP-1;
    const styleSequence = [0,1,0,2];
    let currentStyleIndex = 0, currentStyle = styleSequence[currentStyleIndex];
    let examples = [];

    const imgOSmall = new Image(), imgXSmall = new Image(), imgOBig = new Image(), imgXBig = new Image(), imgC = new Image();
    const barImage = new Image(); barImage.src = 'img/bar.png';
    const imgL1 = new Image(), imgL1Big = new Image(), imgL2 = new Image(), imgL2Big = new Image(), imgL3 = new Image(), imgL3Big = new Image();
    const loaded = { o:false, x:false, O:false, X:false, c:false, l1:false, ll1:false, l2:false, ll2:false, l3:false, ll3:false };

    let chineseNoteMap = {}, userChineseMap = {};
    const BASIC_NOTES = [' ','o','x','O','X','c','l','L'];

    const FALLBACK_TJA = `TITLE:Black Rose Apostle
SUBTITLE:--
BPM:204
WAVE:Black Rose Apostle.ogg
OFFSET:-2.603
DEMOSTART:38.185

COURSE:Oni
LEVEL:10
BALLOON:9,18
SCOREINIT:420
SCOREDIFF:100

#START
10201020,
#END`;

    function updateImageSources() {
        const p = 'img/'+currentStyle+'/';
        imgOSmall.src=p+'o.png'; imgXSmall.src=p+'x.png'; imgOBig.src=p+'oo.png'; imgXBig.src=p+'xx.png'; imgC.src=p+'c.png';
        smallifyImgBig.src=p+'oo.png'; smallifyImgSmall.src=p+'o.png';
        imgL1.src=p+'l1.png'; imgL1Big.src=p+'ll1.png'; imgL2.src=p+'l2.png'; imgL2Big.src=p+'ll2.png'; imgL3.src=p+'l3.png'; imgL3Big.src=p+'ll3.png';
    }
    function bindImageEvents() {
        imgOSmall.onload=()=>{loaded.o=true;checkAllLoaded();}; imgOSmall.onerror=()=>{loaded.o=false;checkAllLoaded();};
        imgXSmall.onload=()=>{loaded.x=true;checkAllLoaded();}; imgXSmall.onerror=()=>{loaded.x=false;checkAllLoaded();};
        imgOBig.onload=()=>{loaded.O=true;checkAllLoaded();}; imgOBig.onerror=()=>{loaded.O=false;checkAllLoaded();};
        imgXBig.onload=()=>{loaded.X=true;checkAllLoaded();}; imgXBig.onerror=()=>{loaded.X=false;checkAllLoaded();};
        imgC.onload=()=>{loaded.c=true;checkAllLoaded();}; imgC.onerror=()=>{loaded.c=false;checkAllLoaded();};
        imgL1.onload=()=>{loaded.l1=true;checkAllLoaded();}; imgL1.onerror=()=>{loaded.l1=false;checkAllLoaded();};
        imgL1Big.onload=()=>{loaded.ll1=true;checkAllLoaded();}; imgL1Big.onerror=()=>{loaded.ll1=false;checkAllLoaded();};
        imgL2.onload=()=>{loaded.l2=true;checkAllLoaded();}; imgL2.onerror=()=>{loaded.l2=false;checkAllLoaded();};
        imgL2Big.onload=()=>{loaded.ll2=true;checkAllLoaded();}; imgL2Big.onerror=()=>{loaded.ll2=false;checkAllLoaded();};
        imgL3.onload=()=>{loaded.l3=true;checkAllLoaded();}; imgL3.onerror=()=>{loaded.l3=false;checkAllLoaded();};
        imgL3Big.onload=()=>{loaded.ll3=true;checkAllLoaded();}; imgL3Big.onerror=()=>{loaded.ll3=false;checkAllLoaded();};
    }
    updateImageSources(); bindImageEvents();

    let pendingRender = false;
    function checkAllLoaded() { if(pendingRender) return; pendingRender=true; requestAnimationFrame(()=>{pendingRender=false; render();}); }

    let randomMap=null, invertActive=false, mergeViewActive=true, backgroundMergeActive=false;
    let smallifyActive=false, tjaModeActive=false, tjaCourses=[], selectedCourse=null;
    let tjaMergeLinesActive=true, visualFocusActive = false, hideBars=false, controlsCollapsed=false;

    function replaceChineseNotes(str) {
        let result = str;
        for (const [ch, replacement] of Object.entries(chineseNoteMap)) {
            if (ch.length === 1 && !'lL'.includes(ch)) result = result.replaceAll(ch, replacement);
        }
        return result;
    }
    function normalize(s){ return s.replace(/（/g,'(').replace(/）/g,')').replace(/【/g,'[').replace(/】/g,']').replace(/｛/g,'{').replace(/｝/g,'}').replace(/，/g,' ').replace(/,/g,' '); }
    function getGapFactor(a,b){ let r=1; const set=new Set(); for(let i=1;i<b.length;i++) if(typeof b[i]==='object'&&b[i].id!=null) set.add(b[i].id); for(let i=1;i<a.length;i++) if(typeof a[i]==='object'&&a[i].id!=null&&set.has(a[i].id)) r*=a[i].value; return r; }

    // ox模式解析 (支持手动小节线)
    function parseGlobal(input) {
        const norm = normalize(input), rows=[], cur=[], typeStack=[], factStack=[];
        let pendHigh=false, pendBar=false, bracketIdCounter=0;
        const curlLeftStack=[], sliderStack=[];
        let globalIdx=0; const curlIntervals=[];
        function push(e){ cur.push(e); globalIdx++; if(globalIdx>1) curlIntervals.push(1); }
        function applyCurl(l,f){ const r=globalIdx-1; if(r<l) return; for(let i=l;i<=r-1;i++) if(i<curlIntervals.length) curlIntervals[i]*=f; }
        for(let i=0;i<norm.length;i++){
            const ch=norm[i];
            if(ch==='\n'){ while(sliderStack.length) sliderStack.pop().el.hasTail=false; if(cur.length) rows.push(cur); cur=[]; pendHigh=pendBar=false; continue; }
            if(ch==='*'){ pendHigh=true; continue; }
            if(ch==='|'||ch==='/'||ch==='\\'){ pendBar=true; continue; }
            if('oxOXc '.includes(ch)){
                const el={type:ch===' '?'space':ch, pathFactors:[1,...factStack], highlight:false, hasBar:false, curlGapToNext:1};
                if(pendHigh){ if(ch!==' ') el.highlight=true; pendHigh=false; }
                if(pendBar){ el.hasBar=true; pendBar=false; }
                push(el); continue;
            }
            if(ch==='l'||ch==='L'){
                const isBig=ch==='L';
                const el={type:ch, pathFactors:[1,...factStack], highlight:false, hasBar:false, curlGapToNext:1, isSlider:true, isBig};
                if(pendHigh){ el.highlight=true; pendHigh=false; }
                if(pendBar){ el.hasBar=true; pendBar=false; }
                if(sliderStack.length===0||sliderStack[sliderStack.length-1].el.type!==ch){
                    const id=bracketIdCounter++; el.sliderRole='head'; el.sliderId=id; el.hasTail=true;
                    sliderStack.push({el, id}); push(el);
                }else{
                    const head=sliderStack.pop(); el.sliderRole='tail'; el.pairId=head.id; push(el);
                }
                continue;
            }
            if(ch==='('){ typeStack.push('('); factStack.push({value:2/3, id:bracketIdCounter++}); }
            else if(ch==='['){ typeStack.push('['); factStack.push({value:1/2, id:bracketIdCounter++}); }
            else if(ch==='{'){ curlLeftStack.push({startGlobalIndex:globalIdx}); }
            if(ch===')'||ch===']'||ch==='}'){
                if(ch==='}'){
                    let j=i+1,num=''; while(j<norm.length&&(norm[j].match(/[0-9.]/)||norm[j]==='.')){ if(norm[j]!=='\n') num+=norm[j]; j++; }
                    const y=parseFloat(num)||16, f=16/y;
                    if(curlLeftStack.length){
                        const top=curlLeftStack[curlLeftStack.length-1], lg=top.startGlobalIndex;
                        if(globalIdx-lg===1&&curlLeftStack.length>=2){ const s=curlLeftStack[curlLeftStack.length-2]; applyCurl(s.startGlobalIndex,f); curlLeftStack.splice(curlLeftStack.length-2,1); }
                        else{ applyCurl(lg,f); curlLeftStack.pop(); }
                    }
                }else{
                    const exp=ch===')'?'(':'['; const idx=typeStack.lastIndexOf(exp);
                    if(idx!==-1){ typeStack.splice(idx,1); factStack.splice(idx,1); }
                }
                continue;
            }
            pendHigh=pendBar=false;
        }
        while(sliderStack.length){ sliderStack.pop().el.hasTail=false; }
        if(cur.length) rows.push(cur);
        let idx=0; for(const r of rows) for(let i=0;i<r.length;i++){ r[i].curlGapToNext=idx<curlIntervals.length?curlIntervals[idx++]:1; }
        return rows.filter(r=>r.length>0);
    }

    function buildRowSliders(elements){
        const sliders=[];
        for(let i=0;i<elements.length;i++){
            const el=elements[i];
            if(!el.isSlider||el.sliderRole!=='head') continue;
            const headIdx=i, isBig=el.isBig;
            let tailIdx=-1;
            for(let j=i+1;j<elements.length;j++){
                if(elements[j].isSlider&&elements[j].sliderRole==='tail'&&elements[j].pairId===el.sliderId){ tailIdx=j; break; }
            }
            if(tailIdx===-1&&el.hasTail){
                let last=headIdx;
                for(let j=headIdx+1;j<elements.length;j++){ if(elements[j].type==='space') last=j; else break; }
                tailIdx=last;
            }else if(tailIdx===-1) tailIdx=headIdx;
            sliders.push({headIdx, tailIdx, isBig});
        }
        return sliders;
    }

    function layoutLine(elements, hsScale, baseGap){
        const pos=[]; let x=0;
        for(let i=0;i<elements.length;i++){ pos.push(x); if(i<elements.length-1) x+=DEFAULT_GAP*getGapFactor(elements[i].pathFactors,elements[i+1].pathFactors)*hsScale*(elements[i].curlGapToNext||1); }
        let minX=Infinity, maxX=-Infinity, first=IMG_SMALL/2;
        elements.forEach((el,idx)=>{
            if(el.type==='space'){ if(pos[idx]<minX) minX=pos[idx]; if(pos[idx]+IMG_SMALL>maxX) maxX=pos[idx]+IMG_SMALL; return; }
            if(el.isSlider){
                const isBig=el.isBig, hSize=isBig?IMG_BIG:IMG_SMALL, tW=isBig?82:53;
                if(el.sliderRole==='head'){ const cx=pos[idx]+IMG_SMALL/2; if(cx-hSize/2<minX) minX=cx-hSize/2; if(cx+hSize/2>maxX) maxX=cx+hSize/2; }
                else if(el.sliderRole==='tail'){ const tx=pos[idx]+IMG_SMALL/2; if(tx<minX) minX=tx; if(tx+tW>maxX) maxX=tx+tW; }
                return;
            }
            const isBig=el.type==='O'||el.type==='X', size=el.type==='c'?IMG_BALLOON_W:(isBig?IMG_BIG:IMG_SMALL);
            const ox=el.type==='c'?-0.5:(isBig?-(IMG_BIG-IMG_SMALL)/2:0);
            const left=pos[idx]+ox; if(left<minX) minX=left; if(left+size>maxX) maxX=left+size;
            if(idx===0) first=pos[idx]+IMG_SMALL/2;
        });
        if(minX===Infinity){ if(baseGap&&elements.length===1&&elements[0].type==='space') return {elements, positions:[0], minX:0, maxX:baseGap*hsScale, width:baseGap*hsScale, height:FIXED_HEIGHT, firstNoteCanvasX:IMG_SMALL/2, firstNoteCanvasY:100}; minX=0; maxX=IMG_SMALL; }
        return {elements, positions:pos, minX, maxX, width:maxX-minX, height:FIXED_HEIGHT, firstNoteCanvasX:first-minX, firstNoteCanvasY:100};
    }

    function invertType(t,inv){ if(!inv||t==='c') return t; return {o:'x',x:'o',O:'X',X:'O'}[t]||t; }
    function smallifyType(t){ return t==='O'?'o':t==='X'?'x':t; }

    function drawLine(canvas, layout, doInvert, doSmallify, randomRow, hideBars, sliders){
        const ctx=canvas.getContext('2d');
        canvas.width=Math.ceil(layout.width); canvas.height=FIXED_HEIGHT;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        // 小节线
        for(let i=0;i<layout.elements.length;i++){
            const el=layout.elements[i];
            if(!el.hasBar||hideBars) continue;
            const cx=layout.positions[i]+IMG_SMALL/2-layout.minX;
            if(barImage.complete&&barImage.naturalWidth>0){ const bw=barImage.naturalWidth||5,bh=barImage.naturalHeight||200; ctx.drawImage(barImage,cx-bw/2,100-bh/2,bw,bh); }
        }
        ctx.save(); ctx.translate(-layout.minX,0);
        // 长条 (底层)
        if(sliders&&sliders.length){
            for(const s of sliders){
                const headX=layout.positions[s.headIdx]+IMG_SMALL/2, tailX=layout.positions[s.tailIdx]+IMG_SMALL/2;
                const isBig=s.isBig, midH=isBig?160:106, tailW=isBig?82:53, tailH=isBig?160:106;
                const tImg=isBig?imgL3Big:imgL3;
                if(tImg&&loaded[isBig?'ll3':'l3']&&tImg.complete) ctx.drawImage(tImg, tailX, 100-tailH/2, tailW, tailH);
                const mImg=isBig?imgL2Big:imgL2;
                if(mImg&&loaded[isBig?'ll2':'l2']&&mImg.complete&&headX<tailX) ctx.drawImage(mImg, headX, 100-midH/2, tailX-headX, midH);
                const hImg=isBig?imgL1Big:imgL1, hSize=isBig?IMG_BIG:IMG_SMALL;
                if(hImg&&loaded[isBig?'ll1':'l1']&&hImg.complete) ctx.drawImage(hImg, headX-hSize/2, 100-hSize/2, hSize, hSize);
            }
        }
        // 普通音符 (上层)
        for(let i=layout.elements.length-1;i>=0;i--){
            const el=layout.elements[i];
            if(!'oxOXc'.includes(el.type)||el.isSlider) continue;
            let dt=el.type; if(randomRow&&randomRow[i]) dt=invertType(dt,true); dt=invertType(dt,doInvert); if(doSmallify&&dt!=='c') dt=smallifyType(dt);
            let size,dx,dy,img;
            if(dt==='c'){ size=IMG_BALLOON_W; dx=layout.positions[i]-0.5; dy=100-IMG_BALLOON_H/2; img=imgC; }
            else{ const ib=dt==='O'||dt==='X'; size=ib?IMG_BIG:IMG_SMALL; dy=100-size/2; dx=ib?layout.positions[i]-(IMG_BIG-IMG_SMALL)/2:layout.positions[i]; img={o:imgOSmall,x:imgXSmall,O:imgOBig,X:imgXBig}[dt]; }
            if(el.highlight){ ctx.shadowColor='white'; ctx.shadowBlur=20; }
            if(img&&loaded[dt]&&img.complete&&img.naturalWidth>0){ if(dt==='c') ctx.drawImage(img,dx,dy,size,IMG_BALLOON_H); else ctx.drawImage(img,dx,dy,size,size); }
            else{ ctx.save(); ctx.beginPath(); ctx.arc(dx+size/2,dy+(dt==='c'?IMG_BALLOON_H:size)/2,size*0.42,0,Math.PI*2); ctx.fillStyle={o:'#F84828',x:'#68c0c0',O:'#F84828',X:'#68c0c0',c:'#FFD700'}[dt]||'#aaa'; ctx.fill(); ctx.restore(); }
            if(el.highlight){ ctx.shadowColor='transparent'; ctx.shadowBlur=0; }
        }
        ctx.restore();
    }

    // ----- TJA解析器 (稳健支持内联#SCROLL等指令) -----
    // ----- TJA解析器 (每大行末尾自动添加小节线) -----
     // ----- TJA解析器 (不自动添加行尾小节线) -----
function parseTJA(text) {
    const courses = [];
    const lines = text.split(/\r?\n/);
    let curCourse = null, inStart = false, b = 1, a = 1;
    let buffer = '';
    let globalTitle = '', curLevel = '';
    const sliderStack = [];      // 改为存储 { el, isBig, isBalloon }
    let sliderIdCounter = 0;
    const mapDigit = { '0':' ', '1':'o', '2':'x', '3':'O', '4':'X', '7':'c' };

    const processSegment = (seg) => {
        if (!seg || !curCourse) return;
        const n = seg.length;
        const baseGap = DEFAULT_GAP * 16 * a * b / n;
        const elements = [];
        for (const ch of seg) {
            if (ch === '5' || ch === '6') {
                // 长条头
                const isBig = ch === '6';
                const el = { type: isBig ? 'L' : 'l', pathFactors: [1], hasBar: false, curlGapToNext: 1, isSlider: true, isBig, sliderRole: 'head' };
                el.sliderId = sliderIdCounter++;
                el.hasTail = true;
                sliderStack.push({ el, isBig, isBalloon: false });
                elements.push(el);
            } else if (ch === '7') {
                // 气球头
                const el = { type: 'c', pathFactors: [1], hasBar: false, curlGapToNext: 1 };
                sliderStack.push({ el: null, isBig: false, isBalloon: true });
                elements.push(el);
            } else if (ch === '8') {
                if (sliderStack.length > 0) {
                    const top = sliderStack.pop();
                    if (top.isBalloon) {
                        // 气球结束：生成一个占位空格，保持小节长度
                        elements.push({ type: 'space', pathFactors: [1], hasBar: false, curlGapToNext: 1 });
                    } else {
                        // 长条结束：生成尾部元素
                        const tailEl = { type: top.isBig ? 'L' : 'l', pathFactors: [1], hasBar: false, curlGapToNext: 1, isSlider: true, isBig: top.isBig, sliderRole: 'tail', pairId: top.el.sliderId };
                        elements.push(tailEl);
                    }
                } else {
                    // 多余的 8 当作空格
                    elements.push({ type: 'space', pathFactors: [1], hasBar: false, curlGapToNext: 1 });
                }
            } else {
                elements.push({ type: mapDigit[ch] || ' ', pathFactors: [1], hasBar: false, curlGapToNext: 1 });
            }
        }
        if (elements.length && !elements[0].isSlider) elements[0].hasBar = true;
        curCourse.rows.push({ elements, baseGap });
    };

        const applyDirective = (dir) => {
            if (dir.startsWith('#MEASURE')) {
                const expr = dir.replace('#MEASURE', '').trim();
                const parts = expr.split('/');
                a = parts.length === 2 ? parseFloat(parts[0]) / parseFloat(parts[1]) : (parseFloat(expr) || 1);
            } else if (dir.startsWith('#SCROLL')) {
                if (visualFocusActive) {
                    const val = parseFloat(dir.replace('#SCROLL', '').trim());
                    if (!isNaN(val)) b = val;
                }
            }
        };

        for (let rawLine of lines) {
            if (rawLine.startsWith('TITLE:')) {
                globalTitle = rawLine.replace('TITLE:', '').trim();
                continue;
            }
            let line = rawLine.trim();
            const ci = line.indexOf('//');
            if (ci !== -1) line = line.substring(0, ci).trim();
            if (!line) continue;

            if (line.startsWith('COURSE:')) {
                if (buffer) {
                    const parts = buffer.split(',');
                    buffer = '';
                    for (const p of parts) {
                        const seg = p.replace(/\s/g, '');
                        if (seg) processSegment(seg);
                        else if (curCourse) curCourse.rows.push({
                            elements: [{ type: 'space', pathFactors: [1], hasBar: true, curlGapToNext: 1 }],
                            baseGap: DEFAULT_GAP * 16 * a * b
                        });
                    }
                }
                if (curCourse && curCourse.rows.length) courses.push(curCourse);
                const name = line.replace('COURSE:', '').trim();
                curCourse = { name, rows: [], title: globalTitle, level: curLevel };
                curLevel = ''; inStart = false; b = 1; a = 1; buffer = '';
            } else if (line === '#START') {
                if (buffer) {
                    const parts = buffer.split(',');
                    buffer = '';
                    for (const p of parts) {
                        const seg = p.replace(/\s/g, '');
                        if (seg) processSegment(seg);
                        else if (curCourse) curCourse.rows.push({
                            elements: [{ type: 'space', pathFactors: [1], hasBar: true, curlGapToNext: 1 }],
                            baseGap: DEFAULT_GAP * 16 * a * b
                        });
                    }
                }
                inStart = true;
            } else if (line === '#END') {
                if (buffer) {
                    const parts = buffer.split(',');
                    buffer = '';
                    for (const p of parts) {
                        const seg = p.replace(/\s/g, '');
                        if (seg) processSegment(seg);
                        else if (curCourse) curCourse.rows.push({
                            elements: [{ type: 'space', pathFactors: [1], hasBar: true, curlGapToNext: 1 }],
                            baseGap: DEFAULT_GAP * 16 * a * b
                        });
                    }
                }
                inStart = false;
            } else if (inStart && curCourse) {
                let idx = 0;
                while (idx < line.length) {
                    if (line[idx] === '#') {
                        if (buffer) {
                            const parts = buffer.split(',');
                            buffer = parts.pop();
                            for (const p of parts) {
                                const seg = p.replace(/\s/g, '');
                                if (seg) processSegment(seg);
                                else if (curCourse) curCourse.rows.push({
                                    elements: [{ type: 'space', pathFactors: [1], hasBar: true, curlGapToNext: 1 }],
                                    baseGap: DEFAULT_GAP * 16 * a * b
                                });
                            }
                        }
                        let dir = '#';
                        idx++;
                        while (idx < line.length && line[idx] !== '#') {
                            dir += line[idx];
                            idx++;
                        }
                        applyDirective(dir.trim());
                    } else {
                        buffer += line[idx];
                        idx++;
                    }
                }
                if (buffer.includes(',')) {
                    const parts = buffer.split(',');
                    buffer = parts.pop();
                    for (const p of parts) {
                        const seg = p.replace(/\s/g, '');
                        if (seg) processSegment(seg);
                        else if (curCourse) curCourse.rows.push({
                            elements: [{ type: 'space', pathFactors: [1], hasBar: true, curlGapToNext: 1 }],
                            baseGap: DEFAULT_GAP * 16 * a * b
                        });
                    }
                }
                // 注意：此处不再追加任何行尾小节线
            } else if (!inStart && line.startsWith('LEVEL:')) {
                curLevel = line.replace('LEVEL:', '').trim();
                if (curCourse) curCourse.level = curLevel;
            }
        }
        if (buffer) {
            const parts = buffer.split(',');
            for (const p of parts) {
                const seg = p.replace(/\s/g, '');
                if (seg) processSegment(seg);
                else if (curCourse) curCourse.rows.push({
                    elements: [{ type: 'space', pathFactors: [1], hasBar: true, curlGapToNext: 1 }],
                    baseGap: DEFAULT_GAP * 16 * a * b
                });
            }
        }
        if (curCourse && curCourse.rows.length) courses.push(curCourse);
        return courses;
    }   // ===== 前半部分结束，后续代码请补充完整版本中的剩余函数及初始化 =====
    // ----- TJA转ox文本 -----
    function convertTJAtoText(rows) {
        return rows.map(r => {
            const n = r.elements.map(e => e.type === 'space' ? ' ' : e.type).join('');
            const y = r.baseGap > 0 ? 1440 / r.baseGap : 16;
            if (Math.abs(y - 16) < 0.001) return n;
            const s = Number.isInteger(y) ? y.toString() : y.toFixed(4).replace(/0+$/, '').replace(/\.$/, '');
            return `{${n}}${s}`;
        }).join('\n');
    }

    // ----- 合并短行 (TJA) -----
     // ----- 合并短行 (TJA) -----
    function mergeTJARows(rows, hs) {
        const layouts = [];
        let group = { elements: [], positions: [], gapSum: 0, gapToNext: 0, rowCount: 0 };
        for (let r = 0; r < rows.length; r++) {
            const row = rows[r];
            const sb = row.baseGap * hs;
            const isSp = row.elements.length === 1 && row.elements[0].type === 'space';
            const cur = isSp ? sb : sb * (row.elements.length - 1);
            const gap = group.rowCount > 0 ? group.gapToNext : 0;
            if (group.rowCount === 0 || group.gapSum + gap + cur <= MAX_GAP_SUM) {
                if (group.rowCount > 0) group.positions.push(group.positions[group.positions.length-1] + group.gapToNext);
                for (let i = 0; i < row.elements.length; i++) {
                    const el = { ...row.elements[i], hasBar: row.elements[i].hasBar };
                    if (isSp) el.spaceWidth = sb;
                    group.elements.push(el);
                    if (i === 0 && group.rowCount === 0) group.positions.push(0);
                    else if (i > 0) group.positions.push(group.positions[group.positions.length-1] + sb);
                }
                group.gapSum = cur + (group.rowCount > 0 ? gap : 0) + group.gapSum;
                group.gapToNext = sb;
                group.rowCount++;

                // 判断是否该结束当前组：下一行无法合并或已是最后一行
                const nextRow = rows[r+1];
                const nextSb = nextRow ? nextRow.baseGap * hs : 0;
                const nextIsSp = nextRow ? (nextRow.elements.length === 1 && nextRow.elements[0].type === 'space') : false;
                const nextCur = nextRow ? (nextIsSp ? nextSb : nextSb * (nextRow.elements.length - 1)) : 0;
                const willOverflow = nextRow ? (group.gapSum + group.gapToNext + nextCur > MAX_GAP_SUM) : true;

                if (!nextRow || willOverflow) {
                    // 当前原始行是合并组的最后一行，追加小节线空音符
                    const lastPos = group.positions[group.positions.length-1] + sb;
                    group.positions.push(lastPos);
                    group.elements.push({
                        type: 'space',
                        pathFactors: [1],
                        hasBar: true,
                        curlGapToNext: 1
                    });
                    group.gapSum += sb;
                    layouts.push(buildLayoutFromGroup(group));
                    group = { elements: [], positions: [], gapSum: 0, gapToNext: 0, rowCount: 0 };
                }
            } else {
                // 当前组已满，先结束并加上小节线，再开始新组
                const lastPos = group.positions[group.positions.length-1] + group.gapToNext;
                group.positions.push(lastPos);
                group.elements.push({
                    type: 'space',
                    pathFactors: [1],
                    hasBar: true,
                    curlGapToNext: 1
                });
                layouts.push(buildLayoutFromGroup(group));

                group = { elements: [], positions: [], gapSum: 0, gapToNext: 0, rowCount: 0 };
                for (let i = 0; i < row.elements.length; i++) {
                    const el = { ...row.elements[i], hasBar: row.elements[i].hasBar && i === 0 };
                    if (isSp) el.spaceWidth = sb;
                    group.elements.push(el);
                    if (i === 0) group.positions.push(0);
                    else group.positions.push(group.positions[group.positions.length-1] + sb);
                }
                group.gapSum = cur;
                group.gapToNext = sb;
                group.rowCount = 1;

                // 如果这是最后一行，也要追加小节线
                if (r === rows.length - 1) {
                    const lastPos2 = group.positions[group.positions.length-1] + sb;
                    group.positions.push(lastPos2);
                    group.elements.push({
                        type: 'space',
                        pathFactors: [1],
                        hasBar: true,
                        curlGapToNext: 1
                    });
                    layouts.push(buildLayoutFromGroup(group));
                    group = { elements: [], positions: [], gapSum: 0, gapToNext: 0, rowCount: 0 };
                }
            }
        }
        if (group.rowCount > 0) {
            const lastPos = group.positions[group.positions.length-1] + group.gapToNext;
            group.positions.push(lastPos);
            group.elements.push({
                type: 'space',
                pathFactors: [1],
                hasBar: true,
                curlGapToNext: 1
            });
            layouts.push(buildLayoutFromGroup(group));
        }
        return layouts;
    }

    function buildLayoutFromGroup(group) {
        const elements = group.elements, positions = group.positions;
        let minX = Infinity, maxX = -Infinity, first = IMG_SMALL / 2;
        elements.forEach((el, idx) => {
            if (el.type === 'space') {
                if (positions[idx] < minX) minX = positions[idx];
                if (el.spaceWidth) maxX = Math.max(maxX, positions[idx] + el.spaceWidth);
                else maxX = Math.max(maxX, positions[idx] + IMG_SMALL);
                return;
            }
            if (el.isSlider) {
                const isBig = el.isBig, hSize = isBig ? IMG_BIG : IMG_SMALL, tW = isBig ? 82 : 53;
                if (el.sliderRole === 'head') {
                    const cx = positions[idx] + IMG_SMALL / 2;
                    if (cx - hSize/2 < minX) minX = cx - hSize/2;
                    if (cx + hSize/2 > maxX) maxX = cx + hSize/2;
                } else if (el.sliderRole === 'tail') {
                    const tx = positions[idx] + IMG_SMALL / 2;
                    if (tx < minX) minX = tx;
                    if (tx + tW > maxX) maxX = tx + tW;
                }
                return;
            }
            const isBig = el.type === 'O' || el.type === 'X';
            const size = el.type === 'c' ? IMG_BALLOON_W : (isBig ? IMG_BIG : IMG_SMALL);
            const ox = el.type === 'c' ? -0.5 : (isBig ? -(IMG_BIG - IMG_SMALL)/2 : 0);
            const left = positions[idx] + ox;
            if (left < minX) minX = left;
            if (left + size > maxX) maxX = left + size;
            if (idx === 0) first = positions[idx] + IMG_SMALL / 2;
        });
        if (minX === Infinity) { minX = 0; maxX = IMG_SMALL; }
        return { elements, positions, minX, maxX, width: maxX - minX, height: FIXED_HEIGHT, firstNoteCanvasX: first - minX, firstNoteCanvasY: 100 };
    }

    // ----- 难度按钮更新 -----

    let currentRowLayouts = [];

    // ----- 主渲染 -----
    function render() {
        let rowLayouts;
        const hsVal = parseFloat(hsInput.value) || 1;
        const hsScale = hsVal > 0 ? hsVal : 1;
        const doInvert = invertActive, doSmallify = smallifyActive;
        tutorialBox.style.display = tjaModeActive ? 'none' : 'flex';
        divergenceWarning.style.display = tjaModeActive ? 'block' : 'none';

        if (tjaModeActive && selectedCourse) {
            if (tjaMergeLinesActive) {
                rowLayouts = mergeTJARows(selectedCourse.rows, hsScale);
            } else {
                rowLayouts = selectedCourse.rows.map(row => {
                    if (row.elements.length === 1 && row.elements[0].type === 'space') {
                        return layoutLine(row.elements, hsScale, row.baseGap);
                    }
                    return layoutLine(row.elements, hsScale);
                }).filter(l => l.elements.some(e => e.type !== 'space') || l.width > 0);
            }
        } else {
            const rows = parseGlobal(replaceChineseNotes(textarea.value));
            rowLayouts = rows.map(e => layoutLine(e, hsScale)).filter(l => l.elements.some(e => e.type !== 'space'));
        }
        currentRowLayouts = rowLayouts;

        infoBar.innerHTML = `行数:${rowLayouts.length} | 音符:${rowLayouts.reduce((s, l) => s + l.elements.filter(e => e.type !== 'space' || e.isSlider).length, 0)} | HS:${hsScale.toFixed(2)} | 样式:${currentStyle}`;
        previewContainer.querySelectorAll('.preview-row').forEach(el => el.remove());
        if (!rowLayouts.length) { placeholder.style.display = 'block'; return; }
        placeholder.style.display = 'none';

        if (mergeViewActive || backgroundMergeActive) {
            const rowCanvases = rowLayouts.map((l, i) => {
                const c = document.createElement('canvas');
                const sl = buildRowSliders(l.elements);
                drawLine(c, l, doInvert, doSmallify, randomMap?.[i], hideBars, sl);
                return { canvas: c, firstX: l.firstNoteCanvasX, firstY: 100 };
            });
            const maxFirstX = Math.max(...rowCanvases.map(r => r.firstX));
            const infoH = (tjaModeActive && selectedCourse) ? FIXED_HEIGHT : 0;
            const musicY = infoH;
            const finalH = musicY + 100 + (rowLayouts.length - 1) * 200 + 100;
            const maxW = Math.max(...rowCanvases.map((r, i) => (maxFirstX - r.firstX) + r.canvas.width));
            const mc = document.createElement('canvas');
            mc.width = Math.ceil(maxW); mc.height = Math.ceil(finalH);
            const ctx = mc.getContext('2d');
            if (backgroundMergeActive) { ctx.fillStyle = '#272727'; ctx.fillRect(0, 0, mc.width, mc.height); }
            if (tjaModeActive && selectedCourse) {
                const title = selectedCourse.title || '';
                const diff = selectedCourse.name || '';
                const lv = selectedCourse.level || '';
                ctx.save();
                ctx.font = 'bold 90px "DFPKanteiryu", "KaiTi", sans-serif';
                ctx.fillStyle = '#e0d5c5';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 4;
                ctx.fillText(title, 12, 90);
                if (diff || lv) {
                    ctx.font = 'bold 72px "DFPKanteiryu", "KaiTi", sans-serif';
                    ctx.fillText(diff + (lv ? lv : ''), 12, 180);
                }
                ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
                ctx.restore();
            }
            let y = musicY;
            rowLayouts.forEach((l, i) => {
                ctx.drawImage(rowCanvases[i].canvas, maxFirstX - rowCanvases[i].firstX, y);
                if (i < rowLayouts.length - 1) y += 200;
            });
            const div = document.createElement('div'); div.className = 'preview-row';
            div.innerHTML = `<div class="preview-row-header"><span>${backgroundMergeActive ? '合并背景' : '合并多行'} (${rowLayouts.length}行)</span></div>`;
            const wrap = document.createElement('div'); wrap.className = 'preview-canvas-wrapper'; wrap.appendChild(mc); div.appendChild(wrap);
            previewContainer.appendChild(div);
            const scale = Math.min(1, (previewContainer.clientWidth - 32) / maxW);
            mc.style.width = mc.width * scale + 'px'; mc.style.height = mc.height * scale + 'px';
        } else {
            const maxFirstX = Math.max(...rowLayouts.map(l => l.firstNoteCanvasX));
            rowLayouts.forEach((l, i) => {
                const sl = buildRowSliders(l.elements);
                const orig = document.createElement('canvas');
                drawLine(orig, l, doInvert, doSmallify, randomMap?.[i], hideBars, sl);
                const extra = maxFirstX - l.firstNoteCanvasX;
                const final = document.createElement('canvas');
                final.width = Math.ceil(extra + l.width);
                final.height = FIXED_HEIGHT;
                final.getContext('2d').drawImage(orig, extra, 0);
                const div = document.createElement('div'); div.className = 'preview-row';
                div.innerHTML = `<div class="preview-row-header"><span>第${i + 1}行 (${l.elements.filter(e => e.type !== 'space' || e.isSlider).length}音符)</span></div>`;
                const wrap = document.createElement('div'); wrap.className = 'preview-canvas-wrapper'; wrap.appendChild(final); div.appendChild(wrap);
                previewContainer.appendChild(div);
            });
            const allC = previewContainer.querySelectorAll('canvas:not(.preview-checkboxes canvas)');
            const maxW = Math.max(...Array.from(allC).map(c => c.width));
            const scale = Math.min(1, (previewContainer.clientWidth - 32) / maxW);
            allC.forEach(c => {
                c.style.width = c.width * scale + 'px';
                c.style.height = c.height * scale + 'px';
            });
        }
    }

    // ----- 映射管理 -----
    function loadUserMap() {
        try { const d = localStorage.getItem('taikoUserMap'); userChineseMap = d ? JSON.parse(d) : {}; } catch (e) { userChineseMap = {}; }
    }
    function saveUserMap(map) { localStorage.setItem('taikoUserMap', JSON.stringify(map)); userChineseMap = map; Object.assign(chineseNoteMap, userChineseMap); }
    async function loadChineseMap() {
        try {
            const r = await fetch('map.txt');
            if (r.ok) { const t = await r.text(); chineseNoteMap = parseChineseMap(t); }
            else chineseNoteMap = getFallbackChineseMap();
        } catch (e) { chineseNoteMap = getFallbackChineseMap(); }
        loadUserMap();
        Object.assign(chineseNoteMap, userChineseMap);
    }
    function parseChineseMap(text) {
        const m = {};
        const ls = text.split('\n');
        let cur = null;
        for (let l of ls) {
            l = l.trim();
            if (l.startsWith('#')) { cur = l.substring(1).trim(); }
            else if (l && cur) { for (const ch of l.split(/[ \t]+/)) if (ch) m[ch] = cur; }
        }
        return m;
    }
    function getFallbackChineseMap() {
        return {
            '咚':'o','d':'o','口':'o','阳':'o','咔':'x','k':'x','乂':'x','阴':'x',
            '外':'ox','叶':'ox','少阴':'ox','内':'xo','右':'xo','少阳':'xo',
            '吕':'oo','太阳':'oo','爻':'xx','太阴':'xx','乾':'ooo','天':'ooo',
            '坤':'xxx','地':'xxx','巽':'xoo','风':'xoo','坎':'xox','水':'xox',
            '艮':'xxo','山':'xxo','兑':'oox','泽':'oox','离':'oxo','火':'oxo',
            '震':'oxx','雷':'oxx','井':'xxxx'
        };
    }
    function openMapEditor() {
        mapTableBody.innerHTML = '';
        for (const [ch, note] of Object.entries(chineseNoteMap).filter(([k, v]) => !BASIC_NOTES.includes(v) && k.length > 0)) {
            addMapRow(ch, note);
        }
        mapModal.style.display = 'flex';
    }
    function addMapRow(ch = '', note = '') {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="text" class="map-char" value="${escapeHtml(ch)}"></td><td><input type="text" class="map-note" value="${escapeHtml(note)}"></td><td><button class="btn btn-delete-row">🗑️</button></td>`;
        tr.querySelector('.btn-delete-row').addEventListener('click', () => tr.remove());
        mapTableBody.appendChild(tr);
    }
    function escapeHtml(s) { return String(s).replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[m]); }

    btnEditMap.addEventListener('click', openMapEditor);
    btnAddMapRow.addEventListener('click', () => addMapRow());
    btnSaveMap.addEventListener('click', () => {
        const rows = document.querySelectorAll('#mapTable tbody tr');
        const m = {};
        rows.forEach(r => {
            const ch = r.querySelector('.map-char').value.trim();
            const note = r.querySelector('.map-note').value.trim();
            if (ch && note) m[ch] = note;
        });
        saveUserMap(m);
        mapModal.style.display = 'none';
        render();
    });
    btnCancelMap.addEventListener('click', () => { mapModal.style.display = 'none'; });

    // ----- 示例加载 -----
    async function loadExamples() {
        try {
            const r = await fetch('example/example.txt');
            if (!r.ok) throw new Error();
            const t = await r.text();
            examples = parseExampleFile(t);
        } catch (e) { examples = getFallbackExamples(); }
        renderExamples();
    }
    function parseExampleFile(t) {
        const res = [];
        const blocks = t.split(/\n(?=#)/);
        for (const b of blocks) {
            const ls = b.trim().split('\n');
            const label = ls[0].replace(/^#/, '').trim();
            const val = ls.slice(1).join('\n').trim();
            if (label && val) res.push({ label, value: val });
        }
        return res;
    }
    function getFallbackExamples() {
        return [
            { label: '夏祭', value: 'ooo ooo ooo xxx ooo ooo ooo xxx' },
            { label: '灵魂石', value: '|ooxoooxoooxxooxx|ooxoooxooxxooxxo\n|ooxoooxoxxooxxoo(|ooox)o(ooox)o(xooooox)ooo\n|ooxxooxxoxxxoxxx|ooxxooxx(xxxoooxoxox)' },
            { label: '工作2000', value: '[|ooo]ooxxxx[ooo]ooxxxx[|ooo]oxxxxx[ooo]xxx x \n[|ooo]ooxxoo[ooo]ooxxoo[|xxx]xxoooo[xxx]xxoooo\n[|ooo]ooxxxx[ooo]ooxxxx[|ooo]xx[ooo]xx[ooo][ooo]o x \n|o[xxx]xo[xxx]x[ooo]oox X [|ooo]ox[ooo]oxo O O' }
        ];
    }
    function renderExamples() {
        exampleDropdown.innerHTML = '';
        examples.forEach(ex => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-example';
            btn.textContent = ex.label;
            btn.addEventListener('click', (e) => {
                textarea.value = ex.value.replace(/\\n/g, '\n');
                if (tjaModeActive) {
                    tjaModeActive = false;
                    btnModeSwitch.textContent = '切换到TJA模式';
                    updateTjaModeUI();
                }
                courseContainer.style.display = 'none';
                exampleDropdown.style.display = 'none';
                render();
                e.stopPropagation();
            });
            exampleDropdown.appendChild(btn);
        });
    }

    async function loadExternalTJA() {
        try {
            const r = await fetch('example/example.tja');
            if (!r.ok) throw new Error();
            return await r.text();
        } catch (e) { return FALLBACK_TJA; }
    }
   async function enterTJAMode() {
    tjaModeActive = true;
    btnModeSwitch.textContent = '切换到ox模式';
    updateTjaModeUI();
    const tjaContent = await loadExternalTJA();
    textarea.value = tjaContent;
    tjaCourses = parseTJA(tjaContent);
    updateCourseButtons();
    selectedCourse = tjaCourses.length ? tjaCourses[0] : null;
    // TJA模式默认开启合并背景
    backgroundMergeActive = true;
    bgMergeCheckbox.checked = true;
    render();
}
    function exitTJAMode(clear = true) {
        tjaModeActive = false;
        btnModeSwitch.textContent = '切换到TJA模式';
        updateTjaModeUI();
        if (clear) textarea.value = '';
        courseContainer.style.display = 'none';
        selectedCourse = null;
        render();
    }

    // ----- 事件绑定 -----
    btnModeSwitch.addEventListener('click', () => { if (tjaModeActive) exitTJAMode(true); else enterTJAMode(); });
    btnTJAtoText.addEventListener('click', () => { if (!selectedCourse) return; textarea.value = convertTJAtoText(selectedCourse.rows); exitTJAMode(false); });
    tjaFileInput.addEventListener('change', function(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = function(ev) { textarea.value = ev.target.result; if (tjaModeActive) { tjaCourses = parseTJA(textarea.value); updateCourseButtons(); selectedCourse = tjaCourses.length ? tjaCourses[0] : null; } render(); }; r.readAsText(f); });
    textarea.addEventListener('input', () => { if (tjaModeActive) { tjaCourses = parseTJA(textarea.value); updateCourseButtons(); selectedCourse = tjaCourses.length ? tjaCourses[0] : null; } render(); });
    hsInput.addEventListener('input', render);
    btnMergeLines.addEventListener('click', () => { tjaMergeLinesActive = !tjaMergeLinesActive; btnMergeLines.classList.toggle('active', tjaMergeLinesActive); render(); });
    btnIgnoreScroll.addEventListener('click', () => {
        visualFocusActive = !visualFocusActive; btnIgnoreScroll.classList.toggle('active', visualFocusActive);
        if (tjaModeActive) { const prev = selectedCourse ? selectedCourse.name : null; tjaCourses = parseTJA(textarea.value); updateCourseButtons(); selectedCourse = prev ? tjaCourses.find(c => c.name === prev) : (tjaCourses.length ? tjaCourses[0] : null); }
        render();
    });

    mergeViewCheckbox.addEventListener('change', () => {
    mergeViewActive = mergeViewCheckbox.checked;
    render();
});
bgMergeCheckbox.addEventListener('change', () => {
    backgroundMergeActive = bgMergeCheckbox.checked;
    render();
});
// 删除原有的互斥逻辑
    invertToggle.addEventListener('click', () => { invertActive = !invertActive; invertToggle.classList.toggle('active', invertActive); render(); });
    btnRandom.addEventListener('click', () => {
        if (!currentRowLayouts.length) return;
        randomMap = currentRowLayouts.map(l => l.elements.map(e => e.type !== 'space' && Math.random() < 0.5));
        render();
    });
    btnResetView.addEventListener('click', () => {
        invertActive = false; invertToggle.classList.remove('active');
        smallifyActive = false; smallifyBtn.classList.remove('active');
        randomMap = null; hideBars = false; btnHideBars.textContent = '隐藏小节线';
        render();
    });
    btnStyleSwitch.addEventListener('click', () => {
        currentStyleIndex = (currentStyleIndex + 1) % styleSequence.length;
        currentStyle = styleSequence[currentStyleIndex];
        Object.keys(loaded).forEach(k => loaded[k] = false);
        updateImageSources(); bindImageEvents();
        updateStyleButtonIcon();
        render();
    });
    smallifyBtn.addEventListener('click', () => { smallifyActive = !smallifyActive; smallifyBtn.classList.toggle('active', smallifyActive); render(); });
    btnHideBars.addEventListener('click', () => { hideBars = !hideBars; btnHideBars.textContent = hideBars ? '显示小节线' : '隐藏小节线'; render(); });
    btnClearBars.addEventListener('click', () => {
        const cleaned = textarea.value.replace(/[|/\\]/g, '');
        textarea.value = cleaned;
        if (tjaModeActive) {
            tjaCourses = parseTJA(cleaned);
            updateCourseButtons();
            selectedCourse = tjaCourses.length ? tjaCourses[0] : null;
        }
        render();
    });
    btnCollapseControls.addEventListener('click', () => {
        controlsCollapsed = !controlsCollapsed;
        if (controlsCollapsed) {
            Array.from(controlsRow.children).forEach(c => { if (c !== btnCollapseControls) c.style.display = 'none'; });
            courseContainer.style.display = 'none'; infoBar.style.display = 'none'; tutorialBox.style.display = 'none';
            legendBox.style.display = 'none'; divergenceWarning.style.display = 'none';
            btnCollapseControls.textContent = '展开功能区';
        } else {
            Array.from(controlsRow.children).forEach(c => { if (c !== btnCollapseControls && c !== btnModeSwitch) c.style.display = ''; });
            updateTjaModeUI();
            infoBar.style.display = ''; tutorialBox.style.display = tjaModeActive ? 'none' : 'flex';
            legendBox.style.display = tjaModeActive ? 'none' : ''; divergenceWarning.style.display = tjaModeActive ? 'block' : 'none';
            btnCollapseControls.textContent = '收起功能区';
        }
        btnModeSwitch.style.display = ''; btnCollapseControls.style.display = '';
    });
    btnDownloadImage.addEventListener('click', () => {
        if (!currentRowLayouts.length) return;
        const doInv = invertActive, doSmall = smallifyActive;
        const rowCanvases = currentRowLayouts.map((l, i) => {
            const c = document.createElement('canvas');
            const sl = buildRowSliders(l.elements);
            drawLine(c, l, doInv, doSmall, randomMap?.[i], hideBars, sl);
            return { canvas: c, firstX: l.firstNoteCanvasX, firstY: 100 };
        });
        const maxFirstX = Math.max(...rowCanvases.map(r => r.firstX));
        const infoH = (tjaModeActive && selectedCourse) ? FIXED_HEIGHT : 0, musicY = infoH;
        const finalH = musicY + 100 + (currentRowLayouts.length - 1) * 200 + 100;
        const maxW = Math.max(...rowCanvases.map((r, i) => (maxFirstX - r.firstX) + r.canvas.width));
        const mc = document.createElement('canvas'); mc.width = Math.ceil(maxW); mc.height = Math.ceil(finalH);
        const ctx = mc.getContext('2d');
        if (backgroundMergeActive) { ctx.fillStyle = '#272727'; ctx.fillRect(0, 0, mc.width, mc.height); }
        if (tjaModeActive && selectedCourse) {
            const title = selectedCourse.title || '', diff = selectedCourse.name || '', lv = selectedCourse.level || '';
            ctx.save(); ctx.font = 'bold 90px "DFPKanteiryu","KaiTi",sans-serif'; ctx.fillStyle = '#e0d5c5';
            ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;
            ctx.fillText(title, 12, 90);
            if (diff || lv) { ctx.font = 'bold 72px "DFPKanteiryu","KaiTi",sans-serif'; ctx.fillText(diff + (lv ? lv : ''), 12, 180); }
            ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.restore();
        }
        let y = musicY;
        currentRowLayouts.forEach((l, i) => { ctx.drawImage(rowCanvases[i].canvas, maxFirstX - rowCanvases[i].firstX, y); if (i < currentRowLayouts.length - 1) y += 200; });
        const url = mc.toDataURL('image/png');
        const w = window.open('');
        if (w) { w.document.write(`<img src="${url}" style="max-width:100%;height:auto;background:#272727;">`); w.document.title = '预览图片'; }
        else alert('请允许弹出窗口');
    });
    exampleDropdownBtn.addEventListener('click', (e) => { e.stopPropagation(); exampleDropdown.style.display = exampleDropdown.style.display === 'flex' ? 'none' : 'flex'; });
    document.addEventListener('click', (e) => { if (!e.target.closest('#exampleDropdownBtn') && !e.target.closest('#exampleDropdown')) exampleDropdown.style.display = 'none'; });

    function updateStyleButtonIcon() {
        const next = styleSequence[(currentStyleIndex + 1) % styleSequence.length];
        btnStyleSwitch.innerHTML = '';
        const img = document.createElement('img');
        img.src = `img/${next}/o.png`; img.alt = '样式'; img.style.width = '28px'; img.style.height = '28px';
        img.onerror = () => { btnStyleSwitch.textContent = '🎨'; };
        btnStyleSwitch.appendChild(img);
        smallifyImgBig.src = `img/${next}/oo.png`;
        smallifyImgSmall.src = `img/${next}/o.png`;
    }

    async function loadCustomFont() {
        try {
            const font = new FontFace('DFPKanteiryu', 'url(Font/Modified-DFPKanteiryu-XB.ttf)');
            await font.load();
            document.fonts.add(font);
        } catch (e) { console.warn('毛笔字体加载失败', e); }
    }

    // ----- 启动 -----
    async function initialize() {
        await loadCustomFont();
        await loadChineseMap();
        await loadExamples();
        updateTjaModeUI();
        textarea.value = '(ooxooxooxooxooox)ox(ooox)ox(oxooox)';
        textarea.setAttribute('wrap', 'off');
        render();
    }
    initialize();
})();
</script>
