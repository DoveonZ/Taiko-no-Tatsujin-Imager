<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太鼓之达人图像生成器</title>
    <style>

            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --text: #2c2416;
            --text-secondary: #6b5e4a;
            --border: #e0d5c5;
            --accent: #c17f59;
            --accent-hover: #a06b48;
            --input-bg: #fdfaf6;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
            --font-mono: 'SF Mono','Cascadia Code','Consolas','Monaco','Menlo',monospace;
            --preview-bg: #272727;
            --preview-card-bg: #1e1e1e;
            --preview-text: #e0d5c5;
            --preview-border: #4a3f35;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height:100vh;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            padding:12px;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(193,127,89,0.06) 0%, transparent 60%),
            radial-gradient(ellipse at 70% 80%, rgba(160,140,110,0.05) 0%, transparent 60%);
        }
        .app-container {
            width:100%;
            max-width:1300px;
            background:var(--card-bg);
            border-radius:20px;
            box-shadow:var(--shadow-lg);
            padding:32px 28px;
            display:flex;
            flex-direction:column;
            gap:20px;
        }
        .app-header h1 { font-size:2rem; font-weight:700; text-align:center; }
        .subtitle { text-align:center; font-size:0.95rem; color:var(--text-secondary); }
        .input-section { display:flex; flex-direction:column; gap:12px; }
        .input-row { display:flex; gap:10px; align-items:stretch; flex-wrap:wrap; }
        .textarea-wrapper { flex:1; min-width:280px; display:flex; }
        .textarea-wrapper textarea {
            flex:1; padding:14px 16px; font-size:1.05rem; font-family:var(--font-mono);
            letter-spacing:0.04em; border:2px solid var(--border); border-radius:var(--radius);
            background:var(--input-bg); color:var(--text); outline:none; resize:vertical;
            line-height:1.6; min-height:10em;
        }
        .btn {
            padding:12px 20px; border:none; border-radius:var(--radius-sm); cursor:pointer;
            font-size:0.9rem; font-weight:600; display:inline-flex; align-items:center; gap:6px;
            background:#f8f5f0; color:var(--text-secondary); border:1.5px solid var(--border);
        }
        .btn-primary { background:var(--accent); color:#fff; border:none; }
        .btn-primary:hover { background:var(--accent-hover); }
        .btn:hover { background:#f0ebe0; }
        .btn-example { padding:6px 12px; font-size:0.85rem; font-family:var(--font-mono); }
        .icon-btn {
            width:40px; height:40px; padding:2px; background:#f8f5f0;
            border:1.5px solid var(--border); border-radius:8px; cursor:pointer;
            display:inline-flex; align-items:center; justify-content:center;
            font-weight:700; font-size:1rem;
        }
        .icon-btn img { width:32px; height:32px; object-fit:contain; }
        .icon-btn.active { background:#e8d5c0; border-color:var(--accent); }
        .icon-btn.bg-active { background:#c17f59; color:#fff; border-color:#a06b48; }
        #btnStyleSwitch { padding:4px; min-width:44px; min-height:44px; }
        #btnStyleSwitch img { max-width:32px; max-height:32px; }
        .examples-row, .course-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:6px; }
        .controls-row { display:flex; flex-wrap:wrap; gap:18px; align-items:center; }
        .control-item input[type="number"] { width:80px; padding:6px 8px; border:2px solid var(--border); border-radius:6px; font-family:var(--font-mono); background:var(--input-bg); }
        .preview-outer {
            background: var(--preview-bg); border:2px dashed var(--preview-border);
            border-radius:var(--radius); padding:16px;
            display:flex; flex-direction:column; gap:20px;
            overflow: visible;
        }
        .preview-row {
            background: var(--preview-card-bg); border:1px solid var(--preview-border);
            border-radius:10px; padding:12px; box-shadow:0 1px 4px rgba(0,0,0,0.3);
        }
        .preview-row-header { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:8px; color:var(--preview-text); }
        .preview-canvas-wrapper { display:flex; justify-content:flex-start; align-items:center; width:100%; overflow: visible; }
        .preview-canvas-wrapper canvas { display:block; border:1px solid var(--preview-border); background:transparent; max-width:none; height:auto; }
        .info-bar { display:flex; gap:16px; flex-wrap:wrap; font-size:0.82rem; color:var(--text-secondary); }
        .legend, .tutorial { display:flex; flex-wrap:wrap; gap:12px; font-size:0.78rem; color:var(--text-secondary); }
        .legend span, .tutorial span { background:#f8f5f0; padding:4px 10px; border-radius:14px; }
        .legend code, .tutorial code { font-family:var(--font-mono); background:#e8e0d2; padding:2px 6px; border-radius:4px; }
        .file-upload { display:inline-block; position:relative; overflow:hidden; }
        .file-upload input[type=file] { position:absolute; left:0; top:0; opacity:0; width:100%; height:100%; cursor:pointer; }
        #divergenceWarning {
            background: #1e1e1e; color: #e0d5c5; padding: 8px 16px;
            border-radius: 8px; text-align: center; font-size: 0.9rem;
        }
        #btnDownloadImage { display: none; }
        @media (max-width: 768px) {
            .app-container { padding: 16px 12px; }
            .app-header h1 { font-size: 1.5rem; }
            .textarea-wrapper textarea { font-size: 0.9rem; min-height: 6em; padding: 10px; }
            .btn { padding: 8px 12px; font-size: 0.8rem; }
            .btn-primary { padding: 8px 12px; }
            .btn-example { padding: 4px 8px; font-size: 0.7rem; }
            .icon-btn { width: 32px; height: 32px; }
            .icon-btn img { width: 24px; height: 24px; }
            .controls-row { gap: 10px; }
            .control-item input[type="number"] { width: 60px; padding: 4px 6px; }
            .preview-outer { padding: 8px; }
            .preview-row { padding: 8px; }
            #btnStyleSwitch img { width: 24px; height: 24px; }
            .file-upload.btn { padding: 8px 12px; }
            #btnDownloadImage { display: inline-flex !important; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <h1>太鼓之达人图像生成器</h1>
        <p class="subtitle">Made by Doveon a.k.a meの我 & Deepseek</p>
    </div>
    <div class="input-section">
        <div class="input-row">
            <div class="textarea-wrapper">
                <textarea id="inputString" placeholder="每行一个排列，括号可跨行&#10;TJA模式下可粘贴TJA内容"></textarea>
            </div>
            <button class="btn btn-primary" id="btnMergeView">多行合并显示</button>
        </div>
        <div class="controls-row">
            <div class="control-item"><label for="hsInput"><strong>HS</strong></label><input type="number" id="hsInput" value="1.0" step="0.1" min="0.1"></div>
            <div class="control-item"><label><input type="checkbox" id="smallifyToggle">大音符→小音符</label></div>
            <div class="control-item"><label><input type="checkbox" id="tjaMergeLinesCheckbox" checked>合并短行</label></div>
            <div class="control-item"><label><input type="checkbox" id="ignoreScrollToggle">忽略SCROLL</label></div>
            <button id="invertToggle" class="icon-btn" title="颠倒"><img src="img/Icon/Abekobe.png" alt="颠倒"></button>
            <button id="btnRandom" class="icon-btn" title="随机"><img src="img/Icon/Random.png" alt="随机"></button>
            <button id="bgMergeToggle" class="icon-btn" title="合并背景">BG</button>
            <button class="btn" id="btnStyleSwitch" title="切换样式">🎨</button>
            <button class="btn" id="btnResetView">显示原谱</button>
            <button class="btn" id="btnModeSwitch">切换到TJA模式</button>
            <button class="btn" id="btnTJAtoText" style="display:none;">TJA转文本</button>
            <span class="file-upload btn" id="tjaUploadBtn">
                📂 加载TJA <input type="file" id="tjaFileInput" accept=".tja,.txt">
            </span>
            <button class="btn btn-primary" id="btnDownloadImage">新页面查看</button>
        </div>
        <div id="courseContainer" style="display:none;" class="course-row">
            <span class="examples-label">难度选择：</span>
        </div>
        <div class="examples-row" id="examplesRow">
            <span class="examples-label">快捷示例：</span>
        </div>
    </div>
    <div id="divergenceWarning" style="display:none;">暂不支持谱面分歧</div>
    <div class="preview-outer" id="previewContainer">
        <div style="text-align:center;color:var(--preview-text);padding:30px;" id="placeholder">🎼 输入音符字符串开始预览</div>
    </div>
    <div class="info-bar" id="infoBar"></div>
    <div class="tutorial" id="tutorialBox">
        <span>高亮：<code>*</code> 后首个音符发光</span>
        <span>小节线：<code>|</code> <code>/</code> <code>\</code> 后首个音符添加小节线</span>
    </div>
    <div class="legend">
        <span>默认间隔16分</span><span><code>( )</code> ×1.5</span><span><code>[ ]</code> ×2</span><span><code>{ }y</code> y分音</span>
        <span>空格空音符</span><span>o/x 小音符</span><span>O/X 大音符</span><span>c 气球</span>
    </div>
</div>

          const origCanvas = document.createElement('canvas');
          drawLine(origCanvas, l, doInvert, doSmallify, randomMap?.[i]);
          const extraLeft = maxFirstX - l.firstNoteCanvasX;
          const finalCanvas = document.createElement('canvas');
          finalCanvas.width = Math.ceil(extraLeft + l.width);
          finalCanvas.height = FIXED_HEIGHT;
          const fctx = finalCanvas.getContext('2d');
          fctx.drawImage(origCanvas, extraLeft, 0);
          const div = document.createElement('div'); div.className = 'preview-row';
          div.innerHTML = `<div class="preview-row-header"><span>🎵 第${i + 1}行 (${l.elements.filter(e => e.type !== 'space').length}音符)</span></div>`;
          const wrap = document.createElement('div'); wrap.className = 'preview-canvas-wrapper';
          wrap.appendChild(finalCanvas); div.appendChild(wrap); previewContainer.appendChild(div);
        });
        const allC = previewContainer.querySelectorAll('canvas');
        const maxW = Math.max(...Array.from(allC).map(c => c.width));
        const scale = Math.min(1, (previewContainer.clientWidth - 32) / maxW);
        allC.forEach(c => { c.style.width = c.width * scale + 'px'; c.style.height = c.height * scale + 'px'; });
      }
    }

    function applyRandom() { if (!currentRowLayouts.length) return; randomMap = currentRowLayouts.map(l => l.elements.map((e, i) => e.type !== 'space' && Math.random() < 0.5)); render(); }
    function resetView() { invertActive = false; invertToggle.classList.remove('active'); smallifyToggle.checked = false; randomMap = null; mergeViewActive = false; backgroundMergeActive = false; bgMergeToggle.classList.remove('bg-active'); btnMergeView.textContent = '📦 合并显示'; render(); }
    function toggleMergeView() { mergeViewActive = !mergeViewActive; if (mergeViewActive && backgroundMergeActive) { backgroundMergeActive = false; bgMergeToggle.classList.remove('bg-active'); } btnMergeView.textContent = mergeViewActive ? '📋 分行显示' : '📦 合并显示'; render(); }
    function toggleBackgroundMerge() { backgroundMergeActive = !backgroundMergeActive; if (backgroundMergeActive && mergeViewActive) { mergeViewActive = false; btnMergeView.textContent = '📦 合并显示'; } bgMergeToggle.classList.toggle('bg-active', backgroundMergeActive); render(); }

    function updateStyleButtonIcon() {
      const nextIndex = (currentStyleIndex + 1) % styleSequence.length;
      const nextStyle = styleSequence[nextIndex];
      const imgSrc = `img/${nextStyle}/o.png`;
      const img = document.createElement('img');
      img.src = imgSrc; img.alt = '样式'; img.style.width = '28px'; img.style.height = '28px';
      img.onerror = () => { btnStyleSwitch.textContent = '🎨'; };
      btnStyleSwitch.innerHTML = '';
      btnStyleSwitch.appendChild(img);
    }

    function switchStyle() {
      currentStyleIndex = (currentStyleIndex + 1) % styleSequence.length;
      currentStyle = styleSequence[currentStyleIndex];
      loaded.o = loaded.x = loaded.O = loaded.X = loaded.c = false;
      updateImageSources(); bindImageEvents(); updateStyleButtonIcon(); render();
    }

    function toggleTjaMode() {
      tjaModeActive = !tjaModeActive;
      btnModeSwitch.textContent = tjaModeActive ? '切换到文本模式' : '切换到TJA模式';
      if (tjaModeActive) {
        examplesRow.style.display = 'none'; tjaUploadBtn.style.display = 'inline-flex';
        ignoreScrollToggle.disabled = false; tjaMergeLinesCheckbox.disabled = false;
        ignoreScrollActive = false; ignoreScrollToggle.checked = false;
        textarea.value = EMBEDDED_TJA;
        tjaCourses = parseTJA(textarea.value);
        updateCourseButtons();
        selectedCourse = tjaCourses.length ? tjaCourses[0] : null;
      } else {
        textarea.value = '';
        examplesRow.style.display = 'flex'; tjaUploadBtn.style.display = 'none';
        ignoreScrollToggle.disabled = true; tjaMergeLinesCheckbox.disabled = true;
        courseContainer.style.display = 'none'; selectedCourse = null;
      }
      render();
    }

    btnTJAtoText.addEventListener('click', () => {
      if (!selectedCourse) return;
      const converted = convertTJAtoText(selectedCourse.rows);
      textarea.value = converted;
      tjaModeActive = false;
      btnModeSwitch.textContent = '切换到TJA模式';
      examplesRow.style.display = 'flex'; tjaUploadBtn.style.display = 'none';
      ignoreScrollToggle.disabled = true; tjaMergeLinesCheckbox.disabled = true;
      courseContainer.style.display = 'none'; selectedCourse = null;
      render();
    });

    tjaFileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        textarea.value = ev.target.result;
        if (tjaModeActive) {
          tjaCourses = parseTJA(textarea.value);
          updateCourseButtons();
          selectedCourse = tjaCourses.length ? tjaCourses[0] : null;
        }
        render();
      };
      reader.readAsText(file);
    });

    textarea.addEventListener('input', () => {
      if (tjaModeActive) {
        tjaCourses = parseTJA(textarea.value);
        updateCourseButtons();
        selectedCourse = tjaCourses.length ? tjaCourses[0] : null;
      }
      render();
    });
    hsInput.addEventListener('input', render);
    smallifyToggle.addEventListener('change', render);
    tjaMergeLinesCheckbox.addEventListener('change', () => { tjaMergeLinesActive = tjaMergeLinesCheckbox.checked; render(); });
    ignoreScrollToggle.addEventListener('change', () => {
      ignoreScrollActive = ignoreScrollToggle.checked;
      if (tjaModeActive) {
        const prevCourseName = selectedCourse ? selectedCourse.name : null;
        tjaCourses = parseTJA(textarea.value);
        updateCourseButtons();
        selectedCourse = prevCourseName ? tjaCourses.find(c => c.name === prevCourseName) : (tjaCourses.length ? tjaCourses[0] : null);
        render();
      }
    });
    btnMergeView.addEventListener('click', toggleMergeView);
    bgMergeToggle.addEventListener('click', toggleBackgroundMerge);
    btnResetView.addEventListener('click', resetView);
    btnStyleSwitch.addEventListener('click', switchStyle);
    invertToggle.addEventListener('click', () => { invertActive = !invertActive; invertToggle.classList.toggle('active', invertActive); render(); });
    btnRandom.addEventListener('click', applyRandom);
    btnModeSwitch.addEventListener('click', toggleTjaMode);

    btnDownloadImage.addEventListener('click', () => {
      if (!currentRowLayouts.length) return;
      const hsVal = parseFloat(hsInput.value);
      const hsScale = isNaN(hsVal) || hsVal <= 0 ? 1 : hsVal;
      const doInvert = invertActive, doSmallify = smallifyToggle.checked;
      const rowCanvases = currentRowLayouts.map((l, i) => {
        const c = document.createElement('canvas');
        drawLine(c, l, doInvert, doSmallify, randomMap ? randomMap[i] : null);
        return { canvas: c, firstX: l.firstNoteCanvasX, firstY: 100 };
      });
      const maxFirstX = Math.max(...rowCanvases.map(r => r.firstX));
      const finalHeight = 100 + (currentRowLayouts.length - 1) * 200 + 100;
      const maxWidth = Math.max(...rowCanvases.map(r => (maxFirstX - r.firstX) + r.canvas.width));
      const mergedCanvas = document.createElement('canvas');
      mergedCanvas.width = Math.ceil(maxWidth);
      mergedCanvas.height = Math.ceil(finalHeight);
      const ctx = mergedCanvas.getContext('2d');
      if (backgroundMergeActive) { ctx.fillStyle = '#272727'; ctx.fillRect(0, 0, mergedCanvas.width, mergedCanvas.height); }
      let y = 100;
      currentRowLayouts.forEach((l, i) => {
        const { canvas, firstX } = rowCanvases[i];
        ctx.drawImage(canvas, maxFirstX - firstX, y - 100);
        if (i < currentRowLayouts.length - 1) y += 200;
      });
      const dataURL = mergedCanvas.toDataURL('image/png');
      const newWindow = window.open('');
      if (newWindow) {
        newWindow.document.write(`<img src="${dataURL}" style="max-width:100%; height:auto; background:#272727;" />`);
        newWindow.document.title = '预览图片 - 太鼓图像生成器';
      } else {
        alert('请允许弹出窗口以查看图片');
      }
    });

    tjaUploadBtn.style.display = 'none';
    ignoreScrollToggle.disabled = true;
    textarea.value = '(ooxooxooxooxooox)ox(ooox)ox(oxooox)';
    tjaMergeLinesCheckbox.disabled = true;
    updateStyleButtonIcon();
    renderExamples();
    setTimeout(() => { render(); }, 400);
  })();
</script>
</body>
</html>
